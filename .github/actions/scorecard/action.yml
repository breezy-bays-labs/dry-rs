name: 'dry-rs Scorecard'
description: |
  Runs dry4rs on caller-supplied paths and emits the v0.1 JSON wire
  envelope plus a human-readable text summary. Self-builds dry4rs
  from the action ref via `cargo build --release -p dry4rs --locked`
  — no binstall path until per-crate v1.0 (see CLAUDE.md "v0.x -> v1.0
  transition" + `ops/decisions/dry-rs/adr-hexagonal-layout.md`).

  Consumers pin to a git tag (e.g. `@v0.1.0`); the action checks the
  dry-rs source out at that ref and compiles the binary fresh on each
  invocation. The caller's source tree stays untouched at
  `$GITHUB_WORKSPACE`.

  Security note: every expression interpolation in this file references
  trusted GitHub Actions context (`github.action_repository`,
  `github.action_ref`, `inputs.*`). Inputs flow through `env:` blocks
  before reaching `run:` so quoted-expansion injection is structurally
  impossible. The literal template-syntax token is omitted from this
  description to prevent GHA's expression engine from evaluating the
  prose at cross-repo action load (see dry-rs#63).

author: 'Breezy Bays Labs'
branding:
  icon: 'copy'
  color: 'blue'

inputs:
  # Defer-to-config defaults: `paths` / `threshold` / `format` all
  # default to empty string. When unset, the action OMITS the matching
  # flag (or positional args) from the dry4rs invocation, letting the
  # binary consult the auto-discovered `dry.toml`. Commit a `dry.toml`
  # at your repo root + invoke the action with only `fail-on-findings`
  # for the recommended minimal-input shape. Setting any input to a
  # non-empty value overrides the matching config value (CLI > config
  # > AdapterMeta default > compiled-in fallback, per
  # `adr-config-file-pattern.md`).
  paths:
    description: |
      Space-separated list of paths to analyze, relative to the
      caller's checkout root. Multiple roots are passed verbatim to
      the dry4rs CLI as positional arguments after the `report`
      subcommand.

      Empty (the default) OMITS positional path args, letting dry4rs
      use its own default — the current working directory
      (`$GITHUB_WORKSPACE`). The future `[walk].src = [...]` field in
      `dry.toml` (tracked: dry-rs#78) will apply once shipped.
    required: false
    default: ''
  threshold:
    description: |
      Jaccard similarity threshold in the half-open interval
      `(0.0, 1.0]`. Tighten to 0.95 for `auto_refactor`-tier-only
      output, or loosen to surface `advisory`-tier matches.

      Empty (the default) OMITS `--threshold`, letting dry4rs consult
      the auto-discovered `dry.toml`'s `[gate].threshold`. Falls back
      to the binary's compiled-in default (0.85 —
      `REVIEW_FIRST_FLOOR`) when no `dry.toml` is present.
    required: false
    default: ''
  format:
    description: |
      Output format for the human-readable rendering invocation that
      writes to the workflow step summary. `text` emits the dry4rs
      reporter's terminal table; `json` emits the v0.1 wire envelope
      inline in the step summary's collapsible block.

      The artifact invocation that writes `output-path` ALWAYS emits
      JSON regardless of this input — the artifact contract is fixed
      for downstream tooling.

      Empty (the default) OMITS `--format` on the text-render
      invocation, letting dry4rs consult the auto-discovered
      `dry.toml`'s `[output].format`. Falls back to `text` when no
      `dry.toml` is present.
    required: false
    default: ''
  output-path:
    description: |
      Path (relative to the caller's checkout root) where the JSON
      envelope is written. Defaults to `dry-rs-report.json`. Surfaced
      on `outputs.report-path`. Always JSON regardless of `format`
      input — the artifact contract is fixed.
    required: false
    default: 'dry-rs-report.json'
  # `extensions:` input was originally exposed here at V1 (PR #61) but the
  # wiring was never hooked into the dry4rs CLI — the binary has no
  # `--extensions` flag (the normalizer's allowlist is compiled-in:
  # `.rs` for the syn adapter). Splicing `--extensions <ext>` into
  # `dry4rs report` crashed cross-repo invocations with `unexpected
  # argument`. Removed at v0.1 (dry-rs#66); re-introduced at v0.2+ in
  # concert with a real `--extensions` flag on the CLI, alongside the
  # dry4ts adapter (v0.6+) where the multi-extension surface actually
  # bites. Consumers MUST drop the input from their workflow YAML.

  fail-on-findings:
    description: |
      When `true` (the default), the action exits non-zero if dry4rs's
      `result.passed == false` (i.e. any matches surface at or above
      the threshold). Set to `false` to emit the scorecard as a
      measurement-only artifact without gating the workflow on the
      verdict (mirrors crap-rs scorecard's `analysis-gate` shape).
    required: false
    default: 'true'

outputs:
  report-path:
    description: |
      Absolute path to the JSON envelope on the runner. Pass to
      downstream tooling that needs to parse `result.summary` /
      `result.matches` directly.
    value: ${{ steps.run.outputs.report_path }}
  findings-count:
    description: |
      Count of matches in the unfiltered `result.matches` array. Sourced
      from the JSON envelope via `jq '.result.matches | length'`;
      truthful-gate value (not affected by `--top` / `--only-failing`).
    value: ${{ steps.run.outputs.findings_count }}
  by-kind-path:
    description: |
      Absolute path to a Markdown table rendering matches by
      (`FormKind`, `Tier`). Rows: `production` / `test` / `doctest`;
      columns: `auto_refactor` / `review_first` / `advisory` plus a
      total. Cells use the "any form involved" semantic — matches whose
      forms span multiple kinds count in each row they touch; row sums
      can exceed the unfiltered match count. Consumers `cat` this file
      into a sticky-comment body or render it as documentation. See
      dry-rs#68.
    value: ${{ steps.run.outputs.by_kind_path }}
  by-crate-path:
    description: |
      Absolute path to a Markdown table rendering matches by crate.
      One row per crate parsed from each match's `forms[].file` prefix
      (`crates/<name>/...`); files outside that layout bucket into
      `<unknown>`. Columns: match count + worst (highest) score across
      that crate's matches. Multi-crate matches contribute one row to
      each crate they touch. Rows sorted descending by match count.
      See dry-rs#68.
    value: ${{ steps.run.outputs.by_crate_path }}

runs:
  using: 'composite'
  steps:
    # No explicit checkout of dry-rs source. When this composite action
    # is invoked cross-repo (`uses: breezy-bays-labs/dry-rs/.github/actions/scorecard@<SHA>`),
    # GitHub Actions auto-downloads the full dry-rs repo at the action
    # ref to `_work/_actions/breezy-bays-labs/dry-rs/<SHA>/` and exposes
    # the path via `$GITHUB_ACTION_PATH`. When invoked locally
    # (`uses: ./.github/actions/scorecard`), the action is read in-place
    # from `$GITHUB_WORKSPACE/.github/actions/scorecard`. Both modes
    # resolve `$GITHUB_ACTION_PATH/../../..` to the dry-rs repo root
    # (3 levels up: scorecard → actions → .github → root).
    #
    # An earlier design used `actions/checkout` with
    # `repository: ${{ github.action_repository }}`. That fails because
    # `github.action_repository` is scoped to the inner action being
    # invoked (here `actions/checkout` itself), NOT the composite
    # action's own repo — so the checkout pulled actions/checkout's
    # source instead of dry-rs's, and cargo built the wrong workspace.
    # See dry-rs#63 for the full diagnosis.

    # Pull the Rust toolchain. `stable` matches what `ci.yml` uses for
    # every Rust job; pinning to MSRV here would force callers to
    # absorb our 1.85 MSRV update cadence in lockstep with their own.
    # SHA-pinned to dtolnay/rust-toolchain@29eef336 (the action's
    # @stable branch tip at the time this composite action shipped);
    # zizmor's `unpinned-uses` audit treats the @stable branch ref as
    # floating, so the SHA pin is the gate-passing form even though
    # the underlying behavior is "track stable rustc."
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch

    # Resolve the dry-rs repo root to an absolute path. Used uniformly
    # by Swatinem cache, build, and binary-invocation steps below.
    # `cd … && pwd` collapses any `..` segments so downstream consumers
    # see a clean absolute path with no fragile path arithmetic.
    #
    # Cross-platform notes:
    # - `pwd` under Git Bash on Windows returns a POSIX-style path
    #   (e.g. `/d/a/dry-rs/dry-rs`). Native Windows tools and Node.js
    #   (Swatinem/rust-cache) prefer Windows-style paths. `pwd -W`
    #   produces the Windows form (`D:/a/dry-rs/dry-rs`) under Git Bash.
    # - dry4rs's compiled binary carries a `.exe` suffix on Windows.
    #   `exe_ext` is the platform-specific suffix to splice onto the
    #   binary path in downstream steps.
    - name: Resolve dry-rs source root
      id: paths
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH/../../.."
        if [ "${RUNNER_OS:-}" = "Windows" ]; then
          DRY_ROOT="$(pwd -W)"
          EXE_EXT=".exe"
        else
          DRY_ROOT="$(pwd)"
          EXE_EXT=""
        fi
        {
          echo "dry_root=$DRY_ROOT"
          echo "exe_ext=$EXE_EXT"
        } >> "$GITHUB_OUTPUT"
        echo "Resolved dry-rs root: $DRY_ROOT"
        echo "Executable extension: '$EXE_EXT'"

    # Cache the dry-rs build artifacts under a per-action-ref key so
    # repeated invocations don't re-download the dependency tree. The
    # cache key includes `github.action_ref` so a pinned `@v0.1.0` and
    # a pinned `@v0.2.0` get independent caches; otherwise the first
    # caller would prime a cache the second caller hits with the wrong
    # `Cargo.lock`.
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        # Workspace path must point at the dry-rs `Cargo.toml`. For
        # cross-repo invocations that's the auto-downloaded action repo
        # under `_work/_actions/breezy-bays-labs/dry-rs/<SHA>/`; for
        # local invocations it's `$GITHUB_WORKSPACE`. The resolved
        # absolute path handles both modes uniformly.
        workspaces: ${{ steps.paths.outputs.dry_root }}
        key: dry-rs-scorecard-${{ github.action_ref }}

    # Build the dry4rs binary from the action ref. `--locked` ensures
    # the in-tree `Cargo.lock` is honored — a CI run can never silently
    # resolve to a newer dep version than what the dry-rs PR validated.
    - name: Build dry4rs from action ref
      shell: bash
      env:
        DRY_ROOT: ${{ steps.paths.outputs.dry_root }}
        EXE_EXT: ${{ steps.paths.outputs.exe_ext }}
      run: |
        set -euo pipefail
        cd "$DRY_ROOT"
        cargo build --release -p dry4rs --locked
        ls -l "target/release/dry4rs${EXE_EXT}"

    # Run the binary against caller-supplied paths. Inputs flow through
    # `env:` rather than direct `${{ }}` interpolation so a path
    # containing shell metacharacters (`$`, backticks, `&&`) cannot
    # inject into the run block. The binary itself takes the
    # comma-free `paths` token list as positional args.
    - name: Run dry4rs scorecard
      id: run
      shell: bash
      env:
        DRY_BIN: ${{ steps.paths.outputs.dry_root }}/target/release/dry4rs${{ steps.paths.outputs.exe_ext }}
        DRY_PATHS: ${{ inputs.paths }}
        DRY_THRESHOLD: ${{ inputs.threshold }}
        DRY_FORMAT: ${{ inputs.format }}
        DRY_OUTPUT_PATH: ${{ inputs.output-path }}
        DRY_FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        # Route action_ref through env too so EVERY interpolation in
        # this `run:` block follows the same env-then-quote discipline.
        # (`action_ref` is trusted context — a git ref the caller
        # pinned — so direct interpolation would be safe; we route it
        # for consistency with the inputs above so the security comment
        # at the top of this file holds uniformly.)
        DRY_ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail

        # Resolve the binary path to an absolute path on disk so the
        # subsequent `cd` to the caller's workspace doesn't break the
        # invocation.
        if [ ! -x "$DRY_BIN" ]; then
          echo "::error::dry4rs binary missing at $DRY_BIN — build step regressed"
          exit 2
        fi

        # Build the positional path args from the whitespace-separated
        # `paths` input. Using `set --` keeps quoting tight; printf
        # %q-style escaping is unnecessary because GitHub Actions
        # delivers the value through the env var rather than splicing
        # it into the shell line.
        #
        # Defer-to-config: when `DRY_PATHS` is empty (the default —
        # see `inputs.paths` description), unquoted word-splitting
        # produces zero positional args, the artifact + text-render
        # invocations below pass no positional paths, and dry4rs uses
        # its own default (CWD = `$GITHUB_WORKSPACE`). Once
        # dry-rs#78's `[walk].src = [...]` ships, the auto-discovered
        # `dry.toml` will drive multi-root paths.
        # shellcheck disable=SC2086
        set -- $DRY_PATHS

        # Defer-to-config: when `DRY_THRESHOLD` / `DRY_FORMAT` are
        # empty (the default — see `inputs.threshold` /
        # `inputs.format` descriptions), the respective `--threshold`
        # / `--format` flags are OMITTED from the invocation, letting
        # dry4rs consult the auto-discovered `dry.toml` (or fall back
        # to compiled defaults). Non-empty input wins — CLI > config >
        # AdapterMeta default > compiled-in fallback, per the cross-
        # tool `adr-config-file-pattern.md` precedence chain.
        threshold_args=()
        if [ -n "$DRY_THRESHOLD" ]; then
          threshold_args+=(--threshold "$DRY_THRESHOLD")
        fi

        # `text_format_args` applies ONLY to the text-render
        # invocation below (the step-summary surface). The artifact
        # invocation hardcodes `--format json` independently because
        # the artifact contract is fixed.
        text_format_args=()
        if [ -n "$DRY_FORMAT" ]; then
          text_format_args+=(--format "$DRY_FORMAT")
        fi

        # `--extensions` flag was originally spliced here at V1 from the
        # `extensions:` input. Removed at v0.1 (dry-rs#66) because the
        # dry4rs CLI has no such flag; the syn normalizer's allowlist
        # (`.rs`) is compiled in. Forward compat for v0.2+ tracked in
        # the action.yml input-list comment block.

        # Stay in the caller's workspace so emitted FormRef.file paths
        # are relative to the caller's checkout (not to
        # `__dry-rs-source/`).
        cd "$GITHUB_WORKSPACE"

        # Render the JSON envelope artifact. Always emit JSON to the
        # artifact path regardless of `inputs.format`; downstream
        # consumers (mokumo aggregator) need JSON. `--threshold` and
        # positional paths defer to `dry.toml` when the inputs are
        # empty — see the conditional-arg build above.
        "$DRY_BIN" report \
          --format json \
          "${threshold_args[@]}" \
          --no-fail \
          "$@" \
          > "$DRY_OUTPUT_PATH"

        # Surface findings count from the JSON envelope. `jq` is
        # pre-installed on GitHub-hosted runners (ubuntu-latest /
        # macos-latest / windows-latest); ci.yml's `span-locations-check`
        # already relies on this assumption.
        findings_count=$(jq '.result.matches | length' "$DRY_OUTPUT_PATH")
        passed=$(jq -r '.result.passed' "$DRY_OUTPUT_PATH")

        # Aggregate matches by (FormKind, Tier) and by crate. Both
        # tables use "any form involved" semantics — a match with forms
        # of mixed kinds (or in multiple crates) contributes one count
        # to each row it touches. This is honest for reviewer triage
        # ("how many matches involve test code?") but means row sums
        # can exceed the total match count. The two tables answer
        # orthogonal questions to the existing tier-summary; positioning
        # them in the step summary is additive (the binary's text
        # reporter still renders unchanged). See dry-rs#68.
        #
        # Score formatting matches the dry4rs text reporter's two-decimal
        # display (`1.00`, `0.85`). Pure jq has no printf-style fixed
        # precision, so the inline padding ladder produces the same
        # visual shape.
        by_kind_md=$(jq -r '
          .result.matches as $matches
          | (["production","test","doctest"]) as $kinds
          | (["auto_refactor","review_first","advisory"]) as $tiers
          | "| kind | auto_refactor | review_first | advisory | total |",
            "| --- | ---: | ---: | ---: | ---: |",
            ( $kinds[] as $k
              | ( $tiers
                  | map(. as $t
                        | $matches
                        | map(select(.tier == $t
                                     and any(.forms[]; .kind == $k)))
                        | length) ) as $row
              | "| `\($k)` | \($row[0]) | \($row[1]) | \($row[2]) | \(($row | add)) |" )
        ' "$DRY_OUTPUT_PATH")

        by_crate_md=$(jq -r '
          def fmt2: . as $w
            | ($w * 100 | round) as $h
            | if $h >= 100 then "1.00"
              elif $h >= 10 then "0.\($h)"
              else "0.0\($h)"
              end;
          .result.matches as $matches
          | [ $matches[]
              | . as $m
              | ($m.forms
                 | map(.file
                       | gsub("\\\\"; "/")
                       | split("/")
                       | if .[0] == "crates" and length > 1 then .[1] else "<unknown>" end)
                 | unique) as $crates
              | $crates[]
              | {crate: ., score: $m.score} ]
          | group_by(.crate)
          | map({crate: .[0].crate, matches: length, worst: (map(.score) | max)})
          | sort_by(-.matches, .crate)
          | if length == 0 then "| crate | matches | worst score |", "| --- | ---: | ---: |", "| _(no matches)_ | 0 | — |"
            else "| crate | matches | worst score |",
                 "| --- | ---: | ---: |",
                 (.[] | "| `\(.crate)` | \(.matches) | \(.worst | fmt2) |")
            end
        ' "$DRY_OUTPUT_PATH")

        # Persist the rendered tables to RUNNER_TEMP files so callers
        # can splice them into sticky-comment bodies without
        # re-implementing the jq aggregations. File-path outputs side-
        # step the multi-line escaping pain of GHA step outputs.
        by_kind_path="${RUNNER_TEMP}/dry-rs-by-kind.md"
        by_crate_path="${RUNNER_TEMP}/dry-rs-by-crate.md"
        printf '%s\n' "$by_kind_md" > "$by_kind_path"
        printf '%s\n' "$by_crate_md" > "$by_crate_path"

        # Resolve output-path to an absolute path so downstream steps
        # can reference it without re-computing relative-to-workspace
        # arithmetic.
        report_path=$(python3 -c "import os, sys; print(os.path.abspath(sys.argv[1]))" "$DRY_OUTPUT_PATH")
        {
          echo "report_path=$report_path"
          echo "findings_count=$findings_count"
          echo "by_kind_path=$by_kind_path"
          echo "by_crate_path=$by_crate_path"
        } >> "$GITHUB_OUTPUT"

        # Render the human-facing summary onto the workflow step
        # summary so reviewers see findings inline in the GitHub UI.
        # We re-run the binary rather than converting the JSON
        # artifact, because the text reporter owns the grouping-by-tier
        # formatting and re-implementing it in jq would duplicate that
        # logic. Format obeys the same defer-to-config rule as the
        # artifact run: `${text_format_args[@]}` is empty when
        # `inputs.format` is empty, in which case dry4rs consults
        # `dry.toml`'s `[output].format` (falling back to text). If a
        # caller's `dry.toml` explicitly sets `format = "json"`, the
        # rendered block contains JSON rather than the text table —
        # accepted as their explicit choice; the `Text report` label
        # below becomes a minor mislabel in that case.
        {
          echo "## dry-rs scorecard"
          echo ""
          echo "- Tool: \`dry4rs\` @ \`$DRY_ACTION_REF\`"
          echo "- Paths: \`${DRY_PATHS:-(deferred to dry.toml or CWD)}\`"
          echo "- Threshold: \`${DRY_THRESHOLD:-(deferred to dry.toml or 0.85)}\`"
          echo "- Findings: \`$findings_count\`"
          echo "- Passed: \`$passed\`"
          echo ""
          echo "### Matches by kind × tier"
          echo ""
          echo "$by_kind_md"
          echo ""
          echo "<sub>Mixed-kind matches count in multiple rows (\"any form involved\" semantic).</sub>"
          echo ""
          echo "### Matches by crate"
          echo ""
          echo "$by_crate_md"
          echo ""
          echo "<sub>Multi-crate matches contribute one row to each crate they touch.</sub>"
          echo ""
          echo "<details><summary>Text report</summary>"
          echo ""
          echo '```'
          "$DRY_BIN" report \
            "${text_format_args[@]}" \
            "${threshold_args[@]}" \
            --no-fail \
            "$@" || true
          echo '```'
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"

        # Honor the fail-on-findings gate. The binary itself was run
        # with --no-fail so it exited 0; the gate decision lives here
        # in the action so we can keep a single source of truth across
        # the binary's exit code and the action's gate input.
        if [ "$DRY_FAIL_ON_FINDINGS" = "true" ] && [ "$passed" != "true" ]; then
          threshold_display="${DRY_THRESHOLD:-(deferred to dry.toml or 0.85)}"
          echo "::error::dry-rs scorecard surfaced $findings_count match(es) at or above the threshold ($threshold_display)"
          exit 1
        fi
