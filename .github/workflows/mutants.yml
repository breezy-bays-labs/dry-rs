name: Mutants

# Mutation testing via cargo-mutants. Per-PR gate scoped to the
# comparison engine — the load-bearing math of dry-core (hash-bucket
# clustering + sliding-window Jaccard, per AGENTS.md "Comparison
# algorithm contract"). Mutating real logic earns its keep here; the
# rest of the workspace (domain newtypes, port traits, file walker,
# reporters) is dominated by trivial constructors and serde derive
# where mutations either survive trivially or are caught structurally
# by the existing wire-envelope snapshots. Widen scope via
# `--file` / `examine_globs` in `.cargo/mutants.toml` when new
# load-bearing logic lands (e.g. the syn normalizer in
# `crates/dry4rs/src/normalizer.rs` — currently exercised by the
# parser-integration tests in `crates/dry4rs/tests/`).
#
# Skip-on-docs: doc-only PRs (`**/*.md`, `docs/**`) can't possibly
# change mutation outcomes; gating on docs would burn 2+ minutes of
# CI for no signal. Mirrors crap4rs's docs-skip pattern.
#
# Workflow-dispatch is wired so an operator can trigger a full run
# from the Actions UI without opening a no-op PR.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: mutants-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # cargo-mutants runs the FULL `dry-core` test suite per mutant. The
  # anti-unification proptests (dry-rs#127, antiunify_proptest.rs) at the
  # default 256 cases dominate that per-mutant time and pushed the slow
  # clustering mutants (e.g. emit_clusters_for_bucket, which routes
  # duplicate-heavy inputs into the O(N^2) path) past the 120s
  # per-mutant floor and the 30-min job budget. A low case count keeps
  # the gate honest: comparison/mod.rs mutants are caught by the
  # DETERMINISTIC kill-tests (dry-rs#116) and a handful of proptest
  # cases, not by 256-case randomness. The full 256-case proptests
  # still run in the regular CI `Test` job. tracked: dry-rs#127.
  PROPTEST_CASES: "32"

defaults:
  run:
    shell: bash

jobs:
  mutants:
    # Single job, single file. cargo-mutants reads `.cargo/mutants.toml`
    # automatically; the per-line `exclude_re` patterns there carry
    # `tracked: dry-rs#36` / `tracked: dry-rs#37` references per
    # `~/.claude/rules/exclusions.md`. The local run on this scope
    # completes in ~2 min; the 30 min job timeout is the
    # cargo-mutants-recommended generous backstop for first-time CI
    # contention and proptest-shrinker tail latency.
    name: Mutation testing (dry-core comparison engine)
    runs-on: ubuntu-latest
    # Bumped 30 -> 45 (dry-rs#127): the anti-unification module added
    # proptest integration binaries that run during every mutant's test
    # phase; `PROPTEST_CASES=32` (env above) keeps the run well under
    # this backstop, which stays generous for CI contention.
    timeout-minutes: 45
    steps:
      # SHA-pinned action refs per the zizmor `unpinned-uses` audit
      # (see `.github/workflows/zizmor.yml`). Pin hashes match the
      # ones in `ci.yml` after PR #38 (zizmor + dependabot hardening
      # for #16) — dependabot updates them in lockstep across both
      # workflows.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Distinct cache key from the main `dry-rs` key in
          # `ci.yml`: mutants installs cargo-mutants as a host tool
          # and reuses the workspace target dir, but the cache shape
          # benefits from staying separated so the main CI cache
          # eviction policy doesn't churn on this job's working set.
          shared-key: dry-rs-mutants
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-mutants
      - name: Run cargo mutants on crates/dry-core/src/comparison/mod.rs
        # `--no-shuffle` keeps mutant order deterministic for triage
        # (re-runs match prior logs); `--in-place` avoids the
        # source-tree copy overhead under the single-worker CI shape.
        # Surviving / timed-out mutants are governed by
        # `.cargo/mutants.toml` `exclude_re` — each line there
        # references its tracking issue.
        run: cargo mutants --package dry-core --file crates/dry-core/src/comparison/mod.rs --no-shuffle --in-place
      - name: Upload mutants.out on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-out
          path: mutants.out/
          retention-days: 7
