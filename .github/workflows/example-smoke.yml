# Quick-start dogfood smoke for the templated example at
# `.github/workflows/examples/dry-scorecard.yml`. Invokes the local
# scorecard composite action with the SAME inputs the templated example
# demonstrates, plus four mechanical assertions on the action's outputs.
#
# What this smoke catches:
#
#   (1) action-liveness drift — the composite action's I/O contract
#       breaks (output shape changes, exit code regresses with
#       `fail-on-findings: false`, a previously-defaulted input becomes
#       required). Surfaced by one of the four assertions below.
#
#   (2) smoke-invocation drift — this file's own invocation becomes
#       invalid (typo in an input key, removed required input). Surfaced
#       by the action step itself failing.
#
#   (3) cross-platform path-resolution drift — the action navigates from
#       `$GITHUB_ACTION_PATH` up to the dry-rs repo root via three `..`
#       segments (`scorecard → actions → .github → root`). A future
#       refactor that moves the action's directory or breaks the
#       runner-OS path semantics shows up here on the next CI run, not
#       three weeks later in mokumo. (Linux runs here; Windows is
#       covered by dry-rs#63's path-quoting fix landed in commit
#       `30d8a01`.)
#
# What this smoke does NOT catch:
#
#   - drift between this smoke and `examples/dry-scorecard.yml`. The
#     two files are independently authored; keeping their inputs in
#     sync is a discipline cost paid by reviewers (or — when it ships —
#     by the dry-rs#57 sync mechanism). The smoke re-invokes from its
#     OWN inputs, not the example's, so a divergence between the two
#     files is invisible here. State this honestly so future readers
#     do not mistake this smoke for a sync gate.
#
#   - cross-repo template-eval bugs — when GHA's action-loader template
#     engine evaluates expressions in the composite action's metadata
#     blocks at cross-repo load time. These reproduce ONLY on the
#     remote `@<sha>` invocation path that consumer repos use; local
#     `./` invocation here loads the action in-place and sidesteps the
#     loader pass. V3 (mokumo Tier 1) is the cross-repo canary by
#     design. The original `${{ ... }}` description-block bug fixed in
#     PR #64 / commit `fc60284` was discovered through V3's mokumo CI;
#     a smoke that runs only in dry-rs cannot catch this class.
#
# Sibling-coherent with crap-rs `.github/workflows/quick-start-smoke.yml`,
# scaled down to dry-rs's smaller v0.1 surface (no HTML reporter, no
# multi-language wrapper, no sticky-comment emission — the action is
# reporter-agnostic at v0.1; sticky-comment posting is a consumer
# responsibility per the breadboard's N5 audit-revision note).
#
# Distinct from `dry-self` (in `self-test.yml`): dry-self proves the
# binary works on dry-rs source; this smoke proves the example
# workflow — the documented usage pattern — stays valid. Both jobs
# exist for distinct reasons per the breadboard's N10 cohesion note
# and must NOT be consolidated.
#
# Files under `.github/workflows/examples/` are documentation only and
# do not auto-trigger — GitHub Actions only fires triggers for files
# DIRECTLY under `.github/workflows/`; subdirectories are ignored. So
# the templated example's own `pull_request:`/`push:` triggers are
# dormant inside dry-rs; this file is the trigger that exercises the
# action against dry-rs's own source.
#
# Security note: every `${{ ... }}` expansion in `run:` blocks below
# references trusted GitHub Actions context only — step outputs from
# sibling steps in this same workflow (`steps.scorecard.*` and
# `steps.scorecard-defer.*` per the dual-canary structure). Per the
# same env-then-quote discipline used in
# `.github/actions/scorecard/action.yml`, these values flow through
# `env:` before reaching `run:` so the security boundary stays
# uniform with the action this smoke invokes.
name: Example workflow smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  example-smoke:
    name: example-smoke (templated example dogfood)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # ================================================================
      # Dual canary — both invocation paths exercised on every CI run.
      # ================================================================
      #
      # The composite action supports two equivalent invocation shapes
      # post-dry-rs#81 (action defer-to-config = idiomatic default):
      #
      #   1. **Override path** — caller passes explicit `paths` /
      #      `threshold` / `format` inputs. The action splices each
      #      non-empty value as a CLI flag, overriding any
      #      auto-discovered `dry.toml` values.
      #   2. **Defer path** (recommended) — caller passes ONLY
      #      `fail-on-findings`. The action OMITS the flags and lets
      #      dry4rs consult the auto-discovered `dry.toml` (falling
      #      back to compiled-in defaults). dry-rs's root `dry.toml`
      #      (committed in dry-rs#76 / PR #80) supplies the values.
      #
      # Both invocations run on every smoke job to keep both paths
      # mechanically honest. Each gets its own `output-path` so the
      # JSON artifacts don't clobber each other.

      # ---- Override path ----------------------------------------------
      #
      # Invoke the local composite action with the SAME inputs as the
      # templated example's override-path snippet
      # (`.github/workflows/examples/dry-scorecard.yml`). The action
      # navigates from `$GITHUB_ACTION_PATH` up three levels to the
      # dry-rs repo root (per the structural fix in PR #65 / commit
      # `e7eca78`) and self-builds dry4rs via
      # `cargo build --release -p dry4rs --locked` from there.
      # `paths:` is interpreted relative to the caller's
      # `$GITHUB_WORKSPACE`, which is dry-rs's own checkout here, so
      # `crates/` resolves to dry-rs's own production source.
      - name: Invoke dry-scorecard action — override path (explicit inputs)
        id: scorecard
        uses: ./.github/actions/scorecard
        with:
          paths: crates/
          # `extensions:` intentionally omitted — the action.yml input
          # is broken at V1 (the `--extensions rs` flag it splices into
          # the dry4rs CLI does not exist; tracked: dry-rs#66, fix in
          # PR #67). The default (empty) leaves dry4rs's syn normalizer
          # compiled-in `rs` allowlist in charge — functionally identical
          # for this smoke's purpose.
          threshold: '0.85'
          fail-on-findings: 'false'

      # ---- Defer path -------------------------------------------------
      #
      # Invoke the same composite action with ZERO override inputs
      # (only `fail-on-findings` + a non-default `output-path` so the
      # artifact doesn't clobber the override-path run's artifact).
      # The action omits `--threshold` / `--format` / positional paths
      # from the dry4rs invocation; the binary auto-discovers dry-rs's
      # root `dry.toml` (committed in dry-rs#76) and consumes
      # `[gate].threshold` + `[output].format` from there. Paths
      # defaults to dry4rs's compiled-in fallback (CWD =
      # `$GITHUB_WORKSPACE`) until the `[walk].src = [...]` field
      # lands per dry-rs#78.
      #
      # `cargo build --release -p dry4rs --locked` re-runs but hits the
      # incremental cache from the override-path invocation above — the
      # second build is a near-no-op.
      - name: Invoke dry-scorecard action — defer path (auto-discover dry.toml)
        id: scorecard-defer
        uses: ./.github/actions/scorecard
        with:
          # Intentionally omit `paths` / `threshold` / `format` to
          # exercise the defer-to-config code path. `dry.toml` at
          # the workspace root supplies values; bare binary CLI
          # defaults supply fallbacks. See `inputs:` in
          # `.github/actions/scorecard/action.yml` for the per-input
          # defer semantics.
          output-path: 'dry-rs-report-defer.json'
          fail-on-findings: 'false'

      # ================================================================
      # Mechanical assertions on the action's contract — both paths.
      # ================================================================
      #
      # Run with `if: always()` so the assertion step executes even when
      # an action step regresses; this surfaces the most informative
      # failure mode (e.g., action exited non-zero on a no-fail
      # invocation — that's a contract regression worth reporting
      # distinctly from a missing-file failure).
      #
      # All eight assertions (four × two paths) live in one shell step
      # so a single regression surfaces a single failure with clear
      # context, rather than a cascade of N consecutive step-level reds.
      # The `assert_contract` shell function factors the four checks so
      # both invocation paths get identical coverage; label argument
      # distinguishes failure messages between the override and defer
      # paths.
      - name: Assertions — action contract holds (both invocation paths)
        if: always()
        env:
          OVERRIDE_OUTCOME: ${{ steps.scorecard.outcome }}
          OVERRIDE_REPORT_PATH: ${{ steps.scorecard.outputs.report-path }}
          DEFER_OUTCOME: ${{ steps.scorecard-defer.outcome }}
          DEFER_REPORT_PATH: ${{ steps.scorecard-defer.outputs.report-path }}
        run: |
          set -euo pipefail

          assert_contract() {
            local label="$1"
            local outcome="$2"
            local report_path="$3"

            # (a) action step exit code matches expected.
            #     With `fail-on-findings: 'false'`, the action MUST exit 0
            #     regardless of whether matches surface — that is the
            #     measurement-only contract. A non-success outcome here
            #     is either a binary regression (dry4rs panicked / build
            #     failed) or a contract regression (the gate-on-findings
            #     posture broke).
            if [ "$outcome" != "success" ]; then
              echo "::error::[$label] action step outcome was '$outcome', expected 'success' (fail-on-findings: false should never gate)"
              return 1
            fi
            echo "[$label] (a) action exit code = success ok"

            # (b) `outputs.report-path` surfaces a path AND that path
            #     is a file present on disk. An empty output or a
            #     missing file means the action's output wiring
            #     regressed (e.g., the `report_path=` line dropped
            #     from `$GITHUB_OUTPUT`) or the artifact write itself
            #     failed silently.
            if [ -z "$report_path" ]; then
              echo "::error::[$label] outputs.report-path is empty — action did not surface the report path"
              return 1
            fi
            if [ ! -f "$report_path" ]; then
              echo "::error::[$label] report-path '$report_path' is not a file (action did not write the JSON envelope)"
              return 1
            fi
            local bytes
            bytes=$(wc -c <"$report_path")
            echo "[$label] (b) report-path '$report_path' exists (${bytes} bytes) ok"

            # (c) the file parses as JSON. `jq .` exits non-zero on a
            #     parse error; redirecting stdout discards the
            #     pretty-printed output (the workflow log already
            #     shows the bytes above). Catches the case where the
            #     binary writes a corrupted / empty / partial envelope
            #     but exits 0.
            if ! jq . "$report_path" >/dev/null; then
              echo "::error::[$label] JSON envelope at '$report_path' did not parse as JSON"
              return 1
            fi
            echo "[$label] (c) JSON envelope parses ok"

            # (d) at least one of `schema_version` / `result` / `view`
            #     is a top-level key. Locks the nested-envelope
            #     contract per adr-nested-json-envelope.md without
            #     freezing the exact shape — if the schema bumps and
            #     `result` rearranges into `result.summary` only, the
            #     `view` and `schema_version` slots remain. Catches a
            #     regression where the binary emits a
            #     structurally-valid JSON object that is NOT the
            #     dry-rs envelope (e.g., a clap error rendered as JSON
            #     instead of the report).
            if ! jq -e 'has("schema_version") or has("result") or has("view")' "$report_path" >/dev/null; then
              echo "::error::[$label] JSON envelope at '$report_path' is missing all of schema_version, result, view — does not match the dry-rs v0.1 wire envelope"
              return 1
            fi
            echo "[$label] (d) envelope has at least one of schema_version|result|view ok"
          }

          assert_contract "override" "$OVERRIDE_OUTCOME" "$OVERRIDE_REPORT_PATH"
          assert_contract "defer"    "$DEFER_OUTCOME"    "$DEFER_REPORT_PATH"

  # ================================================================
  # corpus-smoke — dry-examples regression gate (ADR-3)
  # ================================================================
  #
  # Target:   `crates/dry-examples/` ONLY (the curated fixture corpus
  #           + cross-tool benchmark harness).
  # Mechanism: `cargo nextest run -p dry-examples --locked` exercises
  #           `tests/snapshots.rs` which spawns the dry4rs binary
  #           against each fixture and diffs the resulting JSON
  #           envelope against the committed `expected.json` (after
  #           sentinel normalization per ADR-5).
  # Contract: dry4rs's DETECTION BEHAVIOR matches each fixture's
  #           recorded expectation. Catches regressions in the
  #           normalizer, comparison engine, threshold-tier routing,
  #           and JSON envelope shape against curated inputs.
  #
  # Orthogonal to the `example-smoke` job above: that job exercises
  # the composite action's I/O contract against production-shaped
  # code; this job exercises dry4rs's detection contract against
  # curated fixtures. Per ADR-3, both jobs stay — they measure
  # different surfaces.
  #
  # Staleness nag: parses `bench-output.md`'s `last_refreshed:`
  # frontmatter and emits `::warning::` when the date is more than 30
  # days old. Maintainer-visible passive drift detection without the
  # cost of a scheduled job. Per ADR-8.
  corpus-smoke:
    name: corpus-smoke (dry-examples fixture regression gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      # The harness invokes dry4rs via `cargo run -p dry4rs --` inside
      # the test process (cross-package, so `CARGO_BIN_EXE_dry4rs` is
      # unavailable — cargo PR #8038). Building it ahead-of-time
      # ensures the per-fixture spawn doesn't pay a cold compile.
      - name: Build dry4rs (warm cache for harness spawns)
        run: cargo build --locked -p dry4rs
      - name: Run dry-examples snapshot harness
        run: cargo nextest run -p dry-examples --locked

      # Staleness nag for the cross-tool bench. Parses the
      # `last_refreshed:` frontmatter date and emits `::warning::` if
      # older than 30 days. Skipped (silently) when the file is
      # missing — the corpus may not always ship the bench artifact.
      - name: bench-output.md staleness nag
        run: |
          set -euo pipefail
          BENCH_FILE="crates/dry-examples/examples/bench-output.md"
          if [ ! -f "$BENCH_FILE" ]; then
            echo "::notice::bench-output.md missing — skipping staleness nag"
            exit 0
          fi
          # Extract last_refreshed: YYYY-MM-DD from the YAML
          # frontmatter (first 10 lines is plenty).
          LAST=$(head -n 10 "$BENCH_FILE" | sed -nE 's/^last_refreshed:[[:space:]]*([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/p' | head -n 1)
          if [ -z "$LAST" ]; then
            echo "::warning file=$BENCH_FILE::bench-output.md missing 'last_refreshed:' frontmatter field — refresh-bench.yml workflow_dispatch sets this"
            exit 0
          fi
          # date diff in days, GNU date (Linux runner).
          LAST_EPOCH=$(date -u -d "$LAST" +%s)
          NOW_EPOCH=$(date -u +%s)
          AGE_DAYS=$(( (NOW_EPOCH - LAST_EPOCH) / 86400 ))
          echo "bench-output.md last_refreshed: $LAST ($AGE_DAYS days ago)"
          if [ "$AGE_DAYS" -gt 30 ]; then
            echo "::warning file=$BENCH_FILE::bench-output.md is $AGE_DAYS days old (> 30) — trigger the refresh-bench.yml workflow_dispatch to refresh"
          fi
