name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default workflow permissions: least privilege. Every job in this file
# is read-only (no PR comments, no releases, no commit pushes). Closes
# the workflow-wide leg of the `excessive-permissions` zizmor audit and
# matches the org-wide convention (crap4rs#264, scrap-rs#38). Any future
# job that needs write scopes MUST add a scoped `permissions:` block at
# the job level — workflow-level scope NEVER goes beyond `contents: read`.
permissions:
  contents: read

env:
  CARGO_TARGET_DIR: target
  CARGO_TERM_COLOR: always

# Workflow-level timeout. Per-job 15 min ceiling guards against a wedged
# runner draining minutes overnight; current jobs complete in <2 min so
# this is a generous backstop, not a tight bound.
defaults:
  run:
    shell: bash

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86
          - os: macos-latest
            name: macos-arm
          - os: macos-15-intel
            name: macos-x86
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      - run: cargo nextest run --workspace --all-targets --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-llvm-cov@0.6
      # Threshold rationale: domain-only achieves >95% line coverage
      # trivially (constructors + getters covered by serde tests).
      # Setting at 85% is conservative — accommodates the parser-heavy
      # PR (PR 5) where unreachable error branches legitimately inflate
      # uncovered lines, but catches the agentic-dev failure mode where
      # a future PR adds 200 lines of code and 30 lines of test. Promote
      # to 90% once comparison-engine + reporter coverage settles.
      - run: cargo llvm-cov nextest --workspace --locked --fail-under-lines 85 --lcov --output-path lcov.info
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lcov
          path: lcov.info
          retention-days: 7

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @1.85 branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --workspace --all-targets --locked

  deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # SHA-pinned: cargo-deny is the supply-chain gate itself, so a
      # tag-poisoning attack on the action would silently disable every
      # other supply-chain check. Tag v2 -> 91bf2b6 (verified via
      # `gh api repos/EmbarkStudios/cargo-deny-action/git/ref/tags/v2`).
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2
        with:
          command: check

  ast-purity:
    name: dry-core AST-library purity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The hexagonal layering ADR
    # (`ops/decisions/dry-rs/adr-hexagonal-layout.md`)
    # bans AST libraries from `dry-core`'s source. The structural
    # mechanism is `crates/dry-core/Cargo.toml` itself (a wrong dep
    # would have to be added there to be `use`d), but `serde_derive`
    # already pulls `syn` and `proc-macro2` transitively as proc-macro
    # deps -- cargo-deny's transitive-ban mechanism (`bans.deny.wrappers`)
    # would either false-positive on serde_derive's chain or require a
    # fragile, expanding wrapper list. A source-level grep is the right
    # tool: the rule is "no AST-library imports inside
    # crates/dry-core/src/," and grep enforces exactly that.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Reject AST-library imports in dry-core
        # Static pattern, no untrusted-input interpolation. Regex notes:
        #   - Matches both `use` and `extern crate` forms.
        #   - Optional `(::)?` handles absolute-path imports (`use ::syn::Foo`).
        #   - Trailing `([_:; ]|$)` is a portable word-boundary substitute
        #     that works on GNU and BSD grep (avoids `\b`/`\w` non-portable
        #     shortcuts). Catches `syn::`, `syn;`, `syn_codegen::`,
        #     `swc_ecma_parser::`, `tree_sitter_typescript::`, `rustc_ast::`,
        #     `rustc_parse::`, etc.; rejects false positives like
        #     `use syntactic_analysis::X`.
        #   - `rustc_ast` / `rustc_parse` added per CAO Finding 3.1 of the
        #     PR 2 ADR audit -- closes the rustc-private parser leak vector.
        run: |
          set -euo pipefail
          if grep -rE '^[[:space:]]*(use|extern[[:space:]]+crate)[[:space:]]+(::)?(syn|quote|proc_macro2?|tree_sitter|swc|oxc|rustc_ast|rustc_parse)([_:; ]|$)' crates/dry-core/src/; then
            echo "::error::dry-core must not import AST libraries -- see ops/decisions/dry-rs/adr-hexagonal-layout.md"
            exit 1
          fi
          echo "dry-core is AST-library-pure"

  span-locations-check:
    name: proc-macro2 span-locations enforcement
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The hexagonal layering ADR per-crate dep table footnote requires
    # ALL Rust adapters using `proc-macro2` to enable the `span-locations`
    # feature flag. Without it, `Span::start()` and `Span::end()` silently
    # return `LineColumn { line: 0, column: 0 }` regardless of source
    # position -- a permanent silent-breakage trap for any reporter
    # consuming spans (every reporter dry-rs ships).
    #
    # The check uses `cargo metadata + jq` because it has to be robust
    # against three valid Cargo declaration forms: inline
    # `proc-macro2 = { version = "1", features = ["span-locations"] }`,
    # block `[dependencies.proc-macro2]` with a separate `features` line,
    # and workspace re-export `proc-macro2 = { workspace = true }` (where
    # the features come from `[workspace.dependencies]`). cargo metadata
    # resolves all three to the same JSON shape so a single jq query
    # covers all of them.
    #
    # At PR 2 time this check vacuously passes (no `proc-macro2` deps
    # exist in any workspace member yet); it activates structurally when
    # PR 5 lands the syn-based normalizer in `crates/dry4rs/`.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - name: Reject proc-macro2 deps without span-locations feature
        run: |
          set -euo pipefail
          missing=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] as $p | $p.dependencies[] | select(.name == "proc-macro2") | select((.features // []) | index("span-locations") | not) | "\($p.name): proc-macro2 dependency missing span-locations feature flag"')
          if [[ -n "$missing" ]]; then
            echo "::error::Silent-breakage trap: proc-macro2 dep without span-locations feature"
            echo "$missing"
            echo ""
            echo "Fix: add 'features = [\"span-locations\"]' to the proc-macro2 dep declaration."
            echo "See ops/decisions/dry-rs/adr-hexagonal-layout.md per-crate dep table footnote."
            exit 1
          fi
          echo "All proc-macro2 dependencies have span-locations feature enabled (or no proc-macro2 deps yet)."

  docs:
    name: cargo doc (warnings as errors)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo doc --workspace --no-deps --document-private-items --locked

  # cargo-public-api (semver-style public API gate) and cargo-mutants
  # (mutation testing) are deliberately deferred. cargo-public-api
  # lands at v1.0 when semver gating begins; cargo-mutants lands with
  # the comparison engine PR (PR 6) when mutating real logic earns its
  # keep. Self-check, dry-self, and crap-self land with PR 9 (the
  # self-referential test + symmetric dogfood + composite action).
