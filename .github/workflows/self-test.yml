name: Self-test (dry-self + crap-self + scrap-self)

# Symmetric-dogfood + self-referential test gate for dry-rs.
#
# Lives alongside `ci.yml` rather than extending it so merge isolation
# stays clean for the parallel PR-9 agents working on Issue #10's three
# layers. Triggers + concurrency mirror `ci.yml` (push to main +
# pull_request, single-flight per ref).
#
# Job composition:
#   * dry-self    — runs the dry4rs `tests/self_check.rs` integration
#                   test that analyzes the workspace's own `crates/`
#                   tree and snapshots a stable subset of the JSON wire
#                   envelope. This is the load-bearing gate at v0.1;
#                   the insta snapshot fails CI if the comparison
#                   engine or normalizer regresses.
#   * dry-self-scorecard
#                 — runs the bare `dry4rs` binary against dry-rs's
#                   production source (`crates/dry-core/src/` +
#                   `crates/dry4rs/src/`), auto-discovering `dry.toml`
#                   at the workspace root. Distinct from `dry-self`:
#                   that job exercises the cargo-test surface + insta
#                   snapshot, this job exercises the production CI
#                   surface that external consumers see, with findings
#                   rendered into the workflow step summary.
#                   Measurement-only at v0.1 (`--no-fail`); gate-flip
#                   to fail-on-findings is a follow-up.
#   * dry-corpus-scorecard
#                 — runs the bare `dry4rs` binary against the curated
#                   `crates/dry-examples/examples/` corpus to surface
#                   the analyzer's signal on known duplicates.
#                   Transparency measurement distinct from
#                   `corpus-smoke` in `example-smoke.yml`: that job is
#                   a regression gate against committed `expected.json`
#                   files via the snapshot harness; this job is the
#                   aggregate tier-breakdown rendered in the step
#                   summary.
#   * crap-self   — runs crap4rs against `crates/dry-core/src/` +
#                   `crates/dry4rs/src/` via the public crap-rs
#                   composite action. Production-code CC ladder gate
#                   (analysis-gate: true at the default threshold).
#   * scrap-self  — STUB at PR 9 time. scrap-rs does not yet publish a
#                   composite action under `.github/actions/`. The job
#                   surfaces the gap in CI output + tracks the
#                   follow-up issue. Lifted to a real invocation when
#                   scrap-rs ships its scorecard composite (see the
#                   tracking issue referenced below).
#
# Security note: all `${{ ... }}` expansions in this file reference
# trusted GitHub context only (`github.ref` for concurrency keying).
# No untrusted strings (issue/PR titles, commit messages, fork branch
# names) flow into `run:` blocks — the security_reminder_hook check
# applies to that injection vector and is not relevant here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: self-test-${{ github.ref }}
  cancel-in-progress: true

# Default workflow permissions: least privilege. Every job in this
# file is read-only (no PR comments, no releases, no commit pushes).
# Mirrors `ci.yml`'s permissions block + closes the workflow-wide leg
# of zizmor's `excessive-permissions` audit.
permissions:
  contents: read

env:
  CARGO_TARGET_DIR: target
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  dry-self:
    name: dry-self (self-referential test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2
        with:
          tool: cargo-nextest@0.9
      # The self-check integration test spawns the dry4rs binary
      # (env!("CARGO_BIN_EXE_dry4rs")) and snapshots a stable subset of
      # the JSON wire envelope. The snapshot file under
      # `crates/dry4rs/tests/snapshots/` is the v0.1 baseline; insta
      # surfaces a diff if the analyzer's findings drift.
      - name: Run dry4rs self-referential integration test
        run: cargo nextest run -p dry4rs --test self_check --locked

  dry-self-scorecard:
    name: dry-self-scorecard (production-code DRY measurement)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Job-level least-privilege: the workflow-wide block is
    # `contents: read`; this job opts in to `pull-requests: write` so
    # the marocchino sticky-comment step can post on PR events. The
    # build/run steps don't exercise the elevated token (no API calls
    # to PR endpoints) — only the final post step touches it.
    permissions:
      contents: read
      pull-requests: write
    # Symmetric dogfood on the production CI surface: bare `dry4rs`
    # binary, no flags beyond `--no-fail`, positional paths only.
    # Auto-discovers `dry.toml` at the workspace root via
    # `discover_config` walk-upward and applies `[gate]`/`[output]`/
    # `[walk]` values to the analysis.
    #
    # Why not the local `./.github/actions/scorecard` composite action?
    # That action always passes `--threshold` (default 0.85) and
    # `--format` (default json) as explicit CLI flags, which override
    # any value `dry.toml` sets. A "defer-to-config" mode on the action
    # is a follow-up; the bare binary is the canonical config-driven
    # invocation today.
    #
    # Sibling-coherent with crap-rs#346 (`scorecard-production` job
    # that consumes `crap-rs.toml` via auto-discovery).
    #
    # Measurement-only at v0.1: `--no-fail` makes this surface signal
    # without gating the workflow. Gate-flip to fail-on-findings lands
    # once dry-rs's own internal duplication baseline drops (follow-up).
    #
    # Security note: the only `${{ ... }}` interpolations in this job
    # reference trusted GitHub context (`github.ref` for cache scoping,
    # `github.event_name` for the sticky-comment skip-on-main gate).
    # No untrusted strings flow into `run:` blocks.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build dry4rs (release)
        run: cargo build --release -p dry4rs --locked
      - name: Run dry4rs scorecard on production source (auto-discovers dry.toml)
        # Renders the scorecard once and writes it to TWO surfaces in a
        # single pipeline: `dry-self-scorecard-comment.md` (consumed by
        # the marocchino step below) AND `$GITHUB_STEP_SUMMARY` (always
        # populated — survives push-to-main runs where no PR exists).
        run: |
          set -euo pipefail
          ./target/release/dry4rs report \
            --no-fail \
            crates/dry-core/src \
            crates/dry4rs/src \
            | tee dry-self-scorecard.txt
          {
            echo "## dry-rs · production-code DRY scorecard"
            echo ""
            echo "Bare \`dry4rs\` invocation against \`crates/dry-core/src\` + \`crates/dry4rs/src\`. No \`--config\` / \`--threshold\` / \`--format\` flags — auto-discovers \`dry.toml\` at the workspace root via \`discover_config\` walk-upward."
            echo ""
            cat dry-self-scorecard.txt
          } | tee dry-self-scorecard-comment.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post dry-self-scorecard sticky PR comment
        # Sticky comment edition of the step-summary rendering. Skipped
        # on push-to-main (no PR to comment on); on PR events, marocchino
        # locates any prior comment by `header:` and updates in place.
        # Header value (the HTML-comment dedup marker) mirrors the body
        # H2 above so the sticky stays visually identifiable on the PR.
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: "dry-rs · production-code DRY scorecard"
          path: dry-self-scorecard-comment.md

  dry-corpus-scorecard:
    name: dry-corpus-scorecard (dry-examples corpus measurement)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Job-level least-privilege: see `dry-self-scorecard` for the
    # rationale on the per-job `pull-requests: write` opt-in.
    permissions:
      contents: read
      pull-requests: write
    # Transparency measurement: bare `dry4rs` binary against the
    # curated `crates/dry-examples/examples/` corpus, surfacing the
    # analyzer's aggregate tier signal on known-duplicate fixtures.
    #
    # Distinct from `corpus-smoke` in `example-smoke.yml`: that job
    # is a per-fixture REGRESSION GATE via
    # `cargo nextest run -p dry-examples` comparing each fixture's
    # output to its committed `expected.json` (after sentinel
    # normalization). This job is a workspace-wide aggregate
    # MEASUREMENT rendered into the workflow step summary so
    # reviewers see what dry4rs detects on the corpus at a glance.
    # Per ADR `adr-dry-examples-corpus.md`, both surfaces stay —
    # they measure different things.
    #
    # Shares `dry.toml` with `dry-self-scorecard` via the same
    # `discover_config` walk-upward. Measurement-only (`--no-fail`)
    # because the corpus is INTENTIONALLY duplicate.
    #
    # `--include-ignored` is the lone CLI flag here. `crates/dry-examples/`
    # ships a `.ignore` file containing `*` to keep its curated
    # duplicates out of every default walk (so `dry-self-scorecard` —
    # and any external consumer running dry4rs against a checkout that
    # includes this corpus — never pollutes its production analysis
    # with intentional fixtures). For the corpus-scorecard measurement
    # we explicitly opt back in to scan the ignored tree; this is a CLI
    # flag (not a config knob) because the production posture in
    # `dry.toml` (`include_ignored = false`) is the right default.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build dry4rs (release)
        run: cargo build --release -p dry4rs --locked
      - name: Run dry4rs scorecard on dry-examples corpus
        # Renders the scorecard once and writes it to TWO surfaces in a
        # single pipeline: `dry-corpus-scorecard-comment.md` (consumed
        # by the marocchino step below) AND `$GITHUB_STEP_SUMMARY`
        # (always populated — survives push-to-main runs where no PR
        # exists).
        run: |
          set -euo pipefail
          ./target/release/dry4rs report \
            --no-fail \
            --include-ignored \
            crates/dry-examples/examples \
            | tee dry-corpus-scorecard.txt
          {
            echo "## dry-rs · corpus measurement"
            echo ""
            echo "Bare \`dry4rs\` invocation against \`crates/dry-examples/examples\` with \`--include-ignored\` (the corpus carries a \`.ignore\` file containing \`*\` so it never pollutes default walks — this job opts back in for measurement). The corpus is intentionally duplicate-rich — see [\`crates/dry-examples/EXPECTED.md\`](https://github.com/breezy-bays-labs/dry-rs/blob/main/crates/dry-examples/EXPECTED.md) for the per-fixture catalogue. Measurement only (no gate)."
            echo ""
            cat dry-corpus-scorecard.txt
          } | tee dry-corpus-scorecard-comment.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post dry-corpus-scorecard sticky PR comment
        # See `dry-self-scorecard`'s sticky step for the skip-on-main +
        # header-as-dedup-marker rationale.
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: "dry-rs · corpus measurement"
          path: dry-corpus-scorecard-comment.md

  crap-self:
    name: crap-self (production-code CC ladder)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Symmetric dogfood: dry-rs's CI runs the sibling tool crap4rs
    # against its OWN production code. Coverage is generated locally
    # via cargo-llvm-cov (same toolchain ci.yml uses for the coverage
    # job) so the crap4rs action receives an LCOV file pointing at the
    # production sources.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2
        with:
          tool: cargo-nextest@0.9
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2
        with:
          tool: cargo-llvm-cov@0.6

      # The dry-examples corpus is excluded from this LCOV measurement
      # because it is a curated DRY-violation corpus + cross-tool
      # benchmark harness; its tests spawn dry4rs as a subprocess and
      # its fixture source files are parsed (not compiled) by dry4rs.
      # Including the crate in the LCOV file would feed irrelevant
      # lines into crap4rs's production-code CC ladder. Defense-in-
      # depth on top of the crap4rs.toml exclude entry.
      # adr: ops/decisions/dry-rs/adr-dry-examples-corpus.md (ADR-1)
      - name: Generate workspace LCOV coverage
        run: cargo llvm-cov nextest --workspace --exclude dry-examples --locked --lcov --output-path lcov.info

      # crap-rs composite action — runs the crap4rs analyzer against
      # the production-code coverage file and emits a markdown
      # scorecard. SHA-pinned per the supply-chain hygiene rules; the
      # SHA below resolves to the `crap4rs-v0.6.0` tag on
      # breezy-bays-labs/crap-rs.
      #
      # `analysis-gate: true` — production-code CC ladder is a real
      # gate. The threshold defaults to the cognitive cutoff (15).
      # `config: crap4rs.toml` scopes the gate to production code by
      # excluding `**/tests/**` so test-helper functions (e.g.
      # proptest strategies) — which intrinsically carry higher CC
      # by design — do not enter the gate. scrap-rs is the test-code
      # structural-smell sibling (tracked: dry-rs#40 — wire
      # scrap-self once scrap-rs ships its composite action).
      #
      # The Q1 resolution behind the scoping is documented in the
      # repo-root `crap4rs.toml` and in dry-rs#42 (the PR that
      # refactored the CC>15 hotspots and flipped this gate from
      # measurement-only to production-code real).
      - name: Run crap4rs scorecard (production-code CC ladder)
        uses: breezy-bays-labs/crap-rs/.github/actions/scorecard@7c05007eaf2d90e95e5b865e8850896d59436a77 # crap4rs-v0.6.0
        with:
          language: rust
          coverage: lcov.info
          src: crates
          config: crap4rs.toml
          analysis-gate: true

  scrap-self:
    name: scrap-self (test-code structural smells, PENDING)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # tracked: dry-rs#40 — wire scrap-rs composite action once it ships.
    # PR 9 stub. scrap-rs (https://github.com/breezy-bays-labs/scrap-rs)
    # does not yet publish a composite action under `.github/actions/`
    # — only its `ci.yml` exists at this writing. The issue's AC
    # requires a `scrap-self` job; the prompt directive is to avoid
    # inventing an invocation that doesn't match what scrap-rs will
    # eventually publish. dry-rs#40 tracks the lift.
    steps:
      - name: Surface scrap-rs composite-action gap
        run: |
          echo "::notice::scrap-self is a PR 9 stub — scrap-rs has no public composite action yet."
          echo "::notice::tracked: dry-rs#40 — lifts to real invocation when scrap-rs ships its scorecard."
          echo ""
          echo "Scope when wired:"
          echo "  - run scrap4rs against crates/*/tests/"
          echo "  - fail on test-smell verdict (test-code structural-smell ladder)"
          echo ""
          echo "Why a stub instead of inventing the invocation:"
          echo "  scrap-rs's eventual public input/output contract is unknown;"
          echo "  guessing it now means rewriting this job on first contact"
          echo "  rather than ratcheting in once the contract stabilizes."

  report-html:
    name: report-html (self-contained HTML explorer artifact)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Job-level least-privilege, mirroring `dry-self-scorecard`: the
    # workflow-wide block is `contents: read`; this job opts in to
    # `pull-requests: write` so the marocchino sticky-comment step can
    # post on PR events. The build / run / artifact-upload steps don't
    # exercise the elevated token — only the final post step touches it.
    #
    # NOTE: deliberately NO `contents: write` here. The GitHub Pages
    # *deploy* (which needs `contents: write` to push to `gh-pages`)
    # lives in the SEPARATE `publish-pages` job below (dry-rs#156) so the
    # Pages-deploy scope never co-resides with `pull-requests: write` —
    # zizmor's excessive-permissions audit requires the split. This job
    # only ever holds `pull-requests: write` (the sticky post); the
    # `contents: write` Pages push is the other job's sole scope.
    # adr: ops/decisions/dry-rs/adr-report-mode-ci-pages.md
    permissions:
      contents: read
      pull-requests: write
    # The first REPORT-mode artifact. Mirrors `dry-self-scorecard`:
    # bare `dry4rs report` against the production source, auto-discovers
    # `dry.toml`, measurement-only (`--no-fail`). Distinct from the
    # scorecard jobs in WHAT it emits: this job renders the SELF-
    # CONTAINED HTML duplication explorer (the dual-mode askama reporter
    # shipped in dry-rs#147 / #149 — overview + cluster list + template
    # skeleton + substitution grid + d-slider + scope banner, the full
    # showcase `Capabilities`) and uploads it as a downloadable build
    # artifact, alongside a JSON envelope parsed for the sticky's
    # Forms / Matches / per-tier stats.
    #
    # The live Open-on-Pages link is now WIRED (dry-rs#156): on PR events
    # the compose step sets `PAGES_URL` to this PR's
    # `…github.io/<repo>/pr-<N>/` preview (derived from trusted context:
    # owner + repo name + PR number), so the sticky's `View ↗` cell is a
    # one-click live link. The companion `publish-pages` job below
    # actually pushes `site/index.html` to `gh-pages/pr-<N>/`. On
    # push-to-main `PAGES_URL` stays unset (no PR namespace), so the
    # step-summary degrades to the artifact-only line.
    #
    # Security note: every `${{ ... }}` interpolation in this job
    # references TRUSTED GitHub context — `github.ref` (cache scoping),
    # `github.event_name` (sticky skip-on-main gate),
    # `github.server_url` / `github.repository` / `github.run_id`
    # (the artifact run URL), and `github.repository_owner` /
    # `github.event.repository.name` / `github.event.pull_request.number`
    # (the Pages URL — all workflow-controlled, never attacker text). No
    # untrusted strings (PR title, branch name, commit message) flow into
    # `run:` blocks; the sticky body is composed by
    # `scripts/compose-report-html-comment.sh` reading the JSON envelope
    # on disk, never interpolated PR-author text.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build dry4rs (release)
        run: cargo build --release -p dry4rs --locked
      - name: Render the HTML explorer + JSON envelope
        # ONE binary, TWO emissions over the SAME production source
        # (auto-discovers `dry.toml`; `--format` is passed explicitly
        # per emission so the `dry.toml` `[output].format` value does
        # not pick the surface). `site/index.html` is the self-contained
        # explorer uploaded as the artifact; `report.json` is the v0.1
        # wire envelope parsed by the composer for the sticky stats.
        # Measurement-only (`--no-fail`) — this surface never gates the
        # workflow.
        run: |
          set -euo pipefail
          mkdir -p site
          ./target/release/dry4rs report \
            --no-fail \
            --format html \
            crates/dry-core/src \
            crates/dry4rs/src \
            > site/index.html
          ./target/release/dry4rs report \
            --no-fail \
            --format json \
            crates/dry-core/src \
            crates/dry4rs/src \
            > report.json
          echo "HTML explorer: $(wc -c < site/index.html) bytes -> site/index.html"
      - name: Upload HTML explorer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-html
          path: site/
          if-no-files-found: error
      - name: Compose report-html sticky comment body
        # The sticky body is composed by a script (not inline `run:`)
        # so its empty-state branch is testable — see the negative-test
        # step below. Both ARTIFACT_RUN_URL and PAGES_URL are built from
        # TRUSTED github context only. On PR events PAGES_URL is the live
        # `…github.io/<repo>/pr-<N>/` preview (dry-rs#156); on
        # push-to-main it is left UNSET (no PR namespace) so the composer
        # degrades the View line to the artifact-only note. No
        # PR-author-controlled text ever reaches the script —
        # template-injection-safe. The body also goes to
        # `$GITHUB_STEP_SUMMARY` so push-to-main runs (no PR) still
        # surface the stats.
        env:
          ARTIFACT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Live per-PR Pages preview URL. Empty on non-PR events
          # (`github.event.pull_request.number` is empty), so the
          # composer renders the artifact-only View note then. Built from
          # owner + repo name + PR number — all workflow-controlled.
          PAGES_URL: ${{ github.event_name == 'pull_request' && format('https://{0}.github.io/{1}/pr-{2}/', github.repository_owner, github.event.repository.name, github.event.pull_request.number) || '' }}
        run: |
          set -euo pipefail
          bash scripts/compose-report-html-comment.sh report.json \
            | tee report-html-comment.md >> "$GITHUB_STEP_SUMMARY"
      - name: Gate-pattern negative test — sticky body renders empty + populated
        # Per the gate-pattern-negative-test rule: prove the composer
        # renders BOTH with findings (positive) AND with zero findings
        # (negative) — dry4rs OMITS zero-count tiers from `by_tier`, so
        # the empty-state branch is real. A positive-only check could
        # silently break the empty rendering.
        run: bash scripts/test-compose-report-html-comment.sh
      - name: Post report-html sticky PR comment
        # Sticky edition of the step-summary rendering. Skipped on
        # push-to-main (no PR to comment on); on PR events marocchino
        # locates any prior comment by `header:` and updates in place.
        # The header value (HTML-comment dedup marker) is DISTINCT from
        # the dry/crap/corpus scorecard stickies so all four coexist on
        # the PR; it mirrors the body H2.
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: "dry-rs · report-html explorer"
          path: report-html-comment.md

  publish-pages:
    # Publishes the rendered HTML explorer (`site/index.html`) to this
    # repo's `gh-pages` branch (dry-rs#156, epic #111, resolves the #113
    # "Pages ON" decision), so the `report-html` sticky's `View ↗` cell is
    # a one-click live link. Mirrors cute-dbt's `publish-previews` job:
    #
    #   * On PRs   → `gh-pages/pr-<N>/index.html` (`destination_dir:
    #                pr-<N>`, `keep_files: true` so the root + every OTHER
    #                pr-*/ dir survives; re-runs overwrite this PR's dir in
    #                place → exactly one live preview per PR).
    #   * On main  → `gh-pages/index.html` (ROOT) so the latest report
    #                lives at the Pages root.
    #
    # Permission split (zizmor excessive-permissions, load-bearing): this
    # job carries `contents: write` ONLY (peaceiris pushes to gh-pages) —
    # NO `pull-requests: write`. The sticky lives in the `report-html` job,
    # which carries `pull-requests: write` ONLY — NO `contents: write`.
    # The two scopes NEVER co-reside on one job. This deploy job ALSO
    # carries NO build cache (no Swatinem/rust-cache) — a cache-poisoning
    # vector zizmor's `cache-poisoning` audit forbids on a job that pushes
    # to a branch other CI reads.
    #
    # Fork-PR safety: a fork PR's GITHUB_TOKEN is read-only regardless of
    # `permissions:`, so peaceiris cannot push. Every step is gated on the
    # PR coming from the SAME repo (or on a push event), so the job is a
    # clean no-op (ends green) on fork PRs; the sticky's `View ↗` cell
    # renders the fork caveat there.
    #
    # Security note: every `${{ ... }}` interpolation references TRUSTED
    # GitHub context only (`github.event_name`,
    # `github.event.pull_request.head.repo.full_name`,
    # `github.repository`, the PR number routed through `env:`). No
    # untrusted strings flow into `run:` blocks. The peaceiris
    # `destination_dir` is `pr-<N>` built via `format()` from the PR
    # number — an integer, never attacker text.
    # adr: ops/decisions/dry-rs/adr-report-mode-ci-pages.md
    name: publish-pages (GitHub Pages per-PR + main-root preview)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [report-html]
    # Run on PRs from the SAME repo, and on push-to-main. `if: always()`
    # so a non-zero (but non-fatal) upstream render still attempts to
    # publish whatever HTML landed. Fork PRs are excluded here so the job
    # never even starts its no-op steps on a read-only token.
    if: |
      always()
      && (
        (github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository)
        || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    permissions:
      contents: write   # peaceiris pushes to the gh-pages branch
    # Shared with pr-preview-cleanup.yml: every gh-pages push serializes
    # through one group so concurrent peaceiris pushes can't race + lose
    # commits. `cancel-in-progress: false` — never abandon a half-done
    # branch push.
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      - name: Checkout (peaceiris needs a git workspace)
        # peaceiris/actions-gh-pages runs git against the repo; without a
        # checkout the workspace has no .git and the push fails.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false   # peaceiris authenticates via github_token
          fetch-depth: 1
      - name: Download report-html artifact
        # The `report-html` job uploaded `site/` (the self-contained
        # explorer) as the `report-html` artifact. Pull it back into
        # `./site` so peaceiris can publish it. No new third-party action:
        # `actions/download-artifact` (SHA-pinned) reads THIS run's
        # artifacts. Pinned to v7 to MATCH the `report-html` job's
        # `actions/upload-artifact@…# v7.0.1` — the v4 backend cannot read
        # v7-uploaded artifacts, so the major versions must align.
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: report-html
          path: site
      - name: Show site tree
        run: |
          set -euo pipefail
          echo "publish_dir ./site:"
          find site -type f 2>/dev/null || echo "(empty)"
      - name: Publish to gh-pages (pr-<N>/ on PRs, root on main)
        # keep_files: true preserves every OTHER pr-*/ dir AND the root
        # report (peaceiris would otherwise wipe the branch outside
        # destination_dir). On PRs, destination_dir scopes the push to
        # this PR's namespace; re-runs overwrite it in place. On push to
        # main, destination_dir is empty → publish to the gh-pages ROOT so
        # the latest report lives at the Pages root.
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # Empty on push-to-main → root; `pr-<N>` on pull_request. The
          # PR number is an integer (workflow context), not user text.
          destination_dir: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || '' }}
          keep_files: true
