name: Self-test (dry-self + crap-self + scrap-self)

# Symmetric-dogfood + self-referential test gate for dry-rs.
#
# Lives alongside `ci.yml` rather than extending it so merge isolation
# stays clean for the parallel PR-9 agents working on Issue #10's three
# layers. Triggers + concurrency mirror `ci.yml` (push to main +
# pull_request, single-flight per ref).
#
# Job composition:
#   * dry-self    — runs the dry4rs `tests/self_check.rs` integration
#                   test that analyzes the workspace's own `crates/`
#                   tree and snapshots a stable subset of the JSON wire
#                   envelope. This is the load-bearing gate at v0.1;
#                   the insta snapshot fails CI if the comparison
#                   engine or normalizer regresses.
#   * crap-self   — runs crap4rs against `crates/dry-core/src/` +
#                   `crates/dry4rs/src/` via the public crap-rs
#                   composite action. Production-code CC ladder gate
#                   (analysis-gate: true at the default threshold).
#   * scrap-self  — STUB at PR 9 time. scrap-rs does not yet publish a
#                   composite action under `.github/actions/`. The job
#                   surfaces the gap in CI output + tracks the
#                   follow-up issue. Lifted to a real invocation when
#                   scrap-rs ships its scorecard composite (see the
#                   tracking issue referenced below).
#
# Security note: all `${{ ... }}` expansions in this file reference
# trusted GitHub context only (`github.ref` for concurrency keying).
# No untrusted strings (issue/PR titles, commit messages, fork branch
# names) flow into `run:` blocks — the security_reminder_hook check
# applies to that injection vector and is not relevant here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: self-test-${{ github.ref }}
  cancel-in-progress: true

# Default workflow permissions: least privilege. Every job in this
# file is read-only (no PR comments, no releases, no commit pushes).
# Mirrors `ci.yml`'s permissions block + closes the workflow-wide leg
# of zizmor's `excessive-permissions` audit.
permissions:
  contents: read

env:
  CARGO_TARGET_DIR: target
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  dry-self:
    name: dry-self (self-referential test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      # The self-check integration test spawns the dry4rs binary
      # (env!("CARGO_BIN_EXE_dry4rs")) and snapshots a stable subset of
      # the JSON wire envelope. The snapshot file under
      # `crates/dry4rs/tests/snapshots/` is the v0.1 baseline; insta
      # surfaces a diff if the analyzer's findings drift.
      - name: Run dry4rs self-referential integration test
        run: cargo nextest run -p dry4rs --test self_check --locked

  crap-self:
    name: crap-self (production-code CC ladder)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Symmetric dogfood: dry-rs's CI runs the sibling tool crap4rs
    # against its OWN production code. Coverage is generated locally
    # via cargo-llvm-cov (same toolchain ci.yml uses for the coverage
    # job) so the crap4rs action receives an LCOV file pointing at the
    # production sources.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dry-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-llvm-cov@0.6

      - name: Generate workspace LCOV coverage
        run: |
          cargo llvm-cov nextest \
            --workspace \
            --locked \
            --lcov \
            --output-path lcov.info

      # crap-rs composite action — runs the crap4rs analyzer against
      # the production-code coverage file and emits a markdown
      # scorecard. SHA-pinned per the supply-chain hygiene rules; the
      # SHA below resolves to the `crap4rs-v0.6.0` tag on
      # breezy-bays-labs/crap-rs.
      #
      # `analysis-gate: true` — production-code CC ladder is a real
      # gate. The threshold defaults to the cognitive cutoff (15).
      # `config: crap4rs.toml` scopes the gate to production code by
      # excluding `**/tests/**` so test-helper functions (e.g.
      # proptest strategies) — which intrinsically carry higher CC
      # by design — do not enter the gate. scrap-rs is the test-code
      # structural-smell sibling (tracked: dry-rs#40 — wire
      # scrap-self once scrap-rs ships its composite action).
      #
      # The Q1 resolution behind the scoping is documented in the
      # repo-root `crap4rs.toml` and in dry-rs#42 (the PR that
      # refactored the CC>15 hotspots and flipped this gate from
      # measurement-only to production-code real).
      - name: Run crap4rs scorecard (production-code CC ladder)
        uses: breezy-bays-labs/crap-rs/.github/actions/scorecard@34b05488be45dbdeb5a10199a2a2ef1863517758 # crap4rs-v0.6.0
        with:
          language: rust
          coverage: lcov.info
          src: crates
          config: crap4rs.toml
          analysis-gate: true

  scrap-self:
    name: scrap-self (test-code structural smells, PENDING)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # tracked: dry-rs#40 — wire scrap-rs composite action once it ships.
    # PR 9 stub. scrap-rs (https://github.com/breezy-bays-labs/scrap-rs)
    # does not yet publish a composite action under `.github/actions/`
    # — only its `ci.yml` exists at this writing. The issue's AC
    # requires a `scrap-self` job; the prompt directive is to avoid
    # inventing an invocation that doesn't match what scrap-rs will
    # eventually publish. dry-rs#40 tracks the lift.
    steps:
      - name: Surface scrap-rs composite-action gap
        run: |
          echo "::notice::scrap-self is a PR 9 stub — scrap-rs has no public composite action yet."
          echo "::notice::tracked: dry-rs#40 — lifts to real invocation when scrap-rs ships its scorecard."
          echo ""
          echo "Scope when wired:"
          echo "  - run scrap4rs against crates/*/tests/"
          echo "  - fail on test-smell verdict (test-code structural-smell ladder)"
          echo ""
          echo "Why a stub instead of inventing the invocation:"
          echo "  scrap-rs's eventual public input/output contract is unknown;"
          echo "  guessing it now means rewriting this job on first contact"
          echo "  rather than ratcheting in once the contract stabilizes."
