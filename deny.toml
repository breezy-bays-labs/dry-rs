# cargo-deny configuration for dry-rs.
#
# Locks the supply chain at v0.1 with `serde` (runtime) and `proptest`
# + `serde_json` + `insta` (dev-only). The comparison engine, parser
# adapters, and reporters will add transitive deps as they land — this
# file is the guardrail that keeps that addition deliberate.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
# Allowlisted to exactly the licenses encountered in the current dep
# tree. Every additional license decision happens in the PR that
# introduces the dep so the policy moment lands when it matters,
# not as a pre-allowance. This also keeps cargo-deny's signal-to-noise
# clean — every "unmatched license allowance" warning becomes a real
# action item, not background noise.
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
  # Boost Software License 1.0 — OSI-approved, FSF-recognized, MIT/X11-style
  # permissive license. Introduced by `xxhash-rust` (the cross-toolchain-stable
  # fingerprint hash adopted at PR 5 per the amended O5 ADR). See
  # `ops/decisions/dry-rs/adr-rust-normalization-rules.md` § "Hashing" and
  # `ops/decisions/dry-rs/adr-hexagonal-layout.md` per-crate dep table
  # footnote [²] for the load-bearing rationale.
  "BSL-1.0",
]
confidence-threshold = 0.93

[bans]
# `multiple-versions = "warn"` is intentional for v0.x: detector PRs
# (the parser adapter, the comparison engine, the reporters) will
# inevitably introduce duplicate-semver versions of transitive deps
# (e.g., `bitflags` from `walkdir` + `clap`), and `deny` would block
# on benign duplicates. Promote to `deny` at v1.0.
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []

# AST-library policy.
#
# The hexagonal layering ADR (`ops/decisions/dry-rs/adr-hexagonal-layout.md`)
# bans AST libraries (`syn`, `swc_*`, `oxc_*`, `tree-sitter*`,
# `proc-macro2`, `quote`, `rustc_ast`, `rustc_parse`) from `dry-core`
# so the same library can be linked by every adapter binary in the
# workspace (dry4rs via syn, dry4ts via swc/oxc, future adapters).
#
# This `deny.toml` does NOT encode the per-crate transitive ban via
# `bans.deny.wrappers`, because:
#
# - `dry-core` legitimately uses `serde` derive, which pulls `syn` and
#   `proc-macro2` in as proc-macro deps. cargo-deny treats proc-macros
#   as graph nodes; a naive `{ crate = "syn", wrappers = ["dry4rs"] }`
#   would false-positive on the serde_derive chain.
# - Expanding `wrappers` to allow proc-macro chains (`serde_derive`,
#   `thiserror_impl`, etc.) requires a fragile, ever-growing list — a
#   new derive macro entering the workspace silently bypasses the rule
#   until someone updates the wrappers.
#
# Two enforcement mechanisms substitute for transitive cargo-deny:
#
# 1. **Direct-dep enforcement** — `crates/dry-core/Cargo.toml` does
#    not list any AST library. Any addition would require a deliberate
#    Cargo.toml edit, which is visible in PR diff and structurally
#    forbids the corresponding `use` line.
# 2. **Source-level grep** — the `ast-purity` CI job in
#    `.github/workflows/ci.yml` rejects any `use|extern crate` line
#    referencing `syn`/`quote`/`proc_macro2?`/`tree_sitter`/`swc`/`oxc`/
#    `rustc_ast`/`rustc_parse` inside `crates/dry-core/src/`. The
#    `rustc_ast`/`rustc_parse` alternation closes the rustc-private
#    parser leak vector (CAO Finding 3.1 of the PR 2 ADR audit).
#    Catches the case where an AST lib is added as a dep AND imported
#    in the same PR.
#
# A complementary `span-locations-check` CI job enforces the
# `proc-macro2 = { features = ["span-locations"] }` requirement
# mechanically (per the ADR's per-crate dep table footnote) — silent
# breakage of `Span::start()` / `Span::end()` is structurally rejected,
# not just documented.
#
# Operator backstop: `cargo tree -p dry-core --invert syn` should show
# only proc-macro chains (lines marked `(proc-macro)` like
# `serde_derive`, `thiserror-impl`). Any non-proc-macro path from
# `syn` back to `dry-core` is a real AST-library leak the two
# mechanisms above missed; the operator-side check exists for the
# rare case that happens.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
