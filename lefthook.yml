# Pre-commit and pre-push hooks for dry-rs.
#
# After cloning, run `lefthook install` once to wire git hooks. CI runs
# the same gates plus the coverage threshold; pre-push catches everything
# coverage-independent so most pushes don't burn CI minutes on
# easily-caught local issues.

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all --check
      timeout: 60s
    gitleaks:
      run: gitleaks protect --staged --redact
      timeout: 60s

pre-push:
  parallel: false
  commands:
    # Same battery the `Format`, `Clippy`, `Test (linux-x86)`,
    # `cargo-deny`, and `cargo doc` CI jobs run. Pedantic clippy fires
    # via `#![warn(clippy::pedantic, clippy::cargo)]` at the crate root.
    fmt:
      run: cargo fmt --all --check
      timeout: 60s
    ast-purity:
      # Mirror the `ast-purity` CI job. Rejects AST-library imports in
      # dry-core; per `deny.toml` AST-library policy comment, this is
      # the source-level backstop for the structural Cargo.toml ban.
      # Regex matches both `use` and `extern crate` forms; trailing
      # `([_:; ]|$)` is a portable word-boundary substitute (GNU + BSD
      # grep). Rejects false positives like `use syntactic_analysis::X`.
      # `rustc_ast`/`rustc_parse` added per CAO Finding 3.1 of the PR 2
      # ADR audit — keep this regex in lockstep with ci.yml.
      run: |
        set -euo pipefail
        if grep -rE '^[[:space:]]*(use|extern[[:space:]]+crate)[[:space:]]+(::)?(syn|quote|proc_macro2?|tree_sitter|swc|oxc|rustc_ast|rustc_parse)([_:; ]|$)' crates/dry-core/src/; then
          echo "dry-core must not import AST libraries — see ops/decisions/dry-rs/adr-hexagonal-layout.md"
          exit 1
        fi
      timeout: 30s
    config-ast-purity:
      # Mirror the `dry-core::adapters::config ast-purity check` CI
      # job. Rejects double-quoted adapter-binary-name string literals
      # ("dry.toml", "dry4rs", "dry4ts.toml", "dry4ts") in
      # crates/dry-core/src/adapters/config.rs +
      # crates/dry-core/tests/config.rs per the cross-tool config-file
      # ADR (ops/decisions/org/adr-config-file-pattern.md D7).
      # Sibling-coherent with scrap-rs#37's layer-4 gate.
      # Single source of truth in scripts/check-config-ast-purity.sh.
      run: bash scripts/check-config-ast-purity.sh
      timeout: 30s
    span-locations:
      # Mirror the `span-locations-check` CI job. Rejects any
      # `proc-macro2` dependency that doesn't enable the `span-locations`
      # feature -- silent-breakage trap per the hexagonal layering ADR
      # per-crate dep table footnote. Uses `cargo metadata + jq` for
      # robustness across inline `{ features = [...] }`, block
      # `[dependencies.proc-macro2]`, and workspace re-export forms.
      # Vacuously passes at PR 2 (no proc-macro2 deps yet); activates
      # structurally when PR 5 lands the syn-based normalizer.
      run: |
        set -euo pipefail
        missing=$(cargo metadata --no-deps --format-version 1 \
          | jq -r '.packages[] as $p | $p.dependencies[] | select(.name == "proc-macro2") | select((.features // []) | index("span-locations") | not) | "\($p.name): proc-macro2 dependency missing span-locations feature flag"')
        if [[ -n "$missing" ]]; then
          echo "Silent-breakage trap: proc-macro2 dep without span-locations feature"
          echo "$missing"
          echo ""
          echo "Fix: add 'features = [\"span-locations\"]' to the proc-macro2 dep declaration."
          echo "See ops/decisions/dry-rs/adr-hexagonal-layout.md per-crate dep table footnote."
          exit 1
        fi
      timeout: 30s
    tracked-lint:
      # Mirror the `bdd-tracked-lint` CI job. Rejects any test/coverage
      # suppression (`#[ignore]`, `it.skip(...)`, `--exclude` flag,
      # `exclude`/`skip` config-array, `TODO: re-enable` comment,
      # `if: false` workflow hard-disable) that lacks an adjacent
      # `tracked: <repo>#<n>` or `adr: <path>` reference per
      # `~/.claude/rules/exclusions.md`. Single source of truth in
      # `scripts/tracked-lint.py`; this hook + CI both invoke it so a
      # regex tweak only ever touches one file. Sub-second on the
      # current workspace (43 files scanned in ~50ms); 30s timeout is
      # generous headroom for workspace growth.
      run: python3 scripts/tracked-lint.py
      timeout: 30s
    bot-context-drift:
      # Mirror the `bot-context-drift` CI job (dry-rs#26). Rejects any
      # drift between AGENTS.md's per-crate dep table (under
      # `## Architecture`) and the actual `[dependencies]` in each
      # crate's Cargo.toml. Bidirectional check:
      #   - missing-in-table: Cargo.toml has a dep AGENTS.md doesn't list.
      #   - extra-in-table:   AGENTS.md lists a dep Cargo.toml doesn't have.
      # The AGENTS.md "For automated code reviewers" section grounds
      # CodeRabbit + gemini-code-assist in this table — drift means
      # bots ground their suggestions in stale data. Single source of
      # truth in `scripts/bot-context-drift.py`; this hook + CI both
      # invoke it so any parser tweak only ever touches one file.
      run: python3 scripts/bot-context-drift.py
      timeout: 30s
    clippy:
      run: cargo clippy --workspace --all-targets --locked -- -D warnings
      timeout: 300s
    test:
      run: cargo nextest run --workspace --all-targets --locked
      timeout: 300s
    deny:
      run: cargo deny check
      timeout: 60s
    docs:
      env:
        RUSTDOCFLAGS: -D warnings
      run: cargo doc --workspace --no-deps --document-private-items --locked
      timeout: 120s
