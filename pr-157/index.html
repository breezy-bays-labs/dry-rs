<script type="module">
  // Vanilla single-file explorer. Reads the `#dry-data` island (base64),
  // decodes + parses it, and renders the overview + cluster views from
  // `result.*` (the truthful gate). All DOM is built via createElement +
  // textContent (the `h(...)` helper) — NO raw-markup sink (no string-to-
  // HTML assignment) anywhere, so every user-controlled value (file paths,
  // the title carried in the payload) is inert by construction; no manual
  // escaping. Degrades gracefully when optional fields (mode / capabilities
  // / scope / template) are absent — every access is guarded.
  const TIER_ORDER = ["auto_refactor", "review_first", "advisory"];
  const el = (id) => document.getElementById(id);

  // Append children to a parent ONE NODE AT A TIME via `appendChild`.
  // `appendChild` accepts exactly one Node and NEVER a raw HTML string, so
  // it is not an HTML-parsing sink (unlike the native `Element.append`
  // variadic method, which a static taint scanner conflates with jQuery's
  // HTML-parsing append). Each kid is flattened, null-skipped, and — if not
  // already a Node — wrapped in a text node, so strings can NEVER become
  // markup.
  function appendKids(parent, ...kids) {
    for (const c of kids.flat()) {
      if (c == null) continue;
      parent.appendChild(c.nodeType ? c : document.createTextNode(String(c)));
    }
    return parent;
  }

  // Minimal DOM builder. `attrs.class` -> className; `id` / `data-*` ->
  // setAttribute; everything else -> property assignment. Children are
  // nodes or coerced to text nodes (via `appendKids` / `appendChild`) —
  // strings can NEVER become markup.
  function h(tag, attrs, ...kids) {
    const e = document.createElement(tag);
    for (const k in (attrs || {})) {
      if (k === "class") e.className = attrs[k];
      else if (k === "id" || k.startsWith("data-")) e.setAttribute(k, attrs[k]);
      else e[k] = attrs[k];
    }
    return appendKids(e, ...kids);
  }
  function clear(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function loadData() {
    const node = el("dry-data");
    if (!node) return null;
    try {
      // The island is base64(JSON). Decode UTF-8-safely: atob yields a
      // binary string; map to bytes and TextDecoder reads multibyte source
      // identifiers correctly (a plain atob + JSON.parse mangles them).
      const b64 = (node.textContent || "").trim();
      if (!b64) return {};
      const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    } catch (e) {
      console.error("dry-rs: failed to decode #dry-data island", e);
      return null;
    }
  }

  // Column convention: 0-based in the wire data, displayed +1 (end-inclusive,
  // line 1-based) — matching the text / markdown / annotations surfaces.
  function formLabel(form) {
    const span = form.span || {};
    const start = span.start || {};
    const line = start.line ?? 0;
    const col = (start.column ?? 0) + 1;
    return (form.file ?? "") + ":" + line + ":" + col;
  }

  function tierBadge(tier) {
    return h("span", { class: "badge tier-" + tier }, tier);
  }

  function renderOverview(env) {
    const result = env.result || {};
    const summary = result.summary || {};
    const matches = result.matches || [];
    const byTier = summary.by_tier || {};
    let worst = 0;
    for (const m of matches) worst = Math.max(worst, m.score ?? 0);

    const statLine = h(
      "p",
      null,
      h("span", { class: "stat" }, h("b", null, matches.length), " matches"),
      h("span", { class: "stat" }, h("b", null, summary.total_forms ?? 0), " forms"),
      h("span", { class: "stat" }, "worst ", h("b", null, worst.toFixed(2))),
      env.mode ? [" · mode ", h("code", null, env.mode)] : null,
    );

    let body;
    const rows = [];
    for (const tier of TIER_ORDER) {
      const count = byTier[tier];
      if (!count) continue;
      let tierWorst = 0;
      for (const m of matches) if (m.tier === tier) tierWorst = Math.max(tierWorst, m.score ?? 0);
      rows.push(
        h(
          "tr",
          null,
          h("td", { class: "tier-" + tier }, tier),
          h("td", { class: "num" }, count),
          h("td", { class: "num" }, tierWorst.toFixed(2)),
        ),
      );
    }
    if (rows.length) {
      body = h(
        "table",
        null,
        h("thead", null,
          h("tr", null,
            h("th", null, "Tier"),
            h("th", { class: "num" }, "Matches"),
            h("th", { class: "num" }, "Worst"))),
        h("tbody", null, rows),
      );
    } else {
      body = h("p", { class: "empty" }, "No matches above threshold.");
    }

    const ov = el("overview");
    clear(ov);
    appendKids(ov, h("h2", null, "Overview"), h("div", { class: "panel" }, statLine, body));
  }

  function tierRank(tier) {
    const i = TIER_ORDER.indexOf(tier);
    return i === -1 ? TIER_ORDER.length : i;
  }

  // Large-cluster ceiling: clusters with more members than this collapse
  // their substitution grid by default (revealable on demand), so a huge
  // n-ary match never renders thousands of cells eagerly.
  const MEMBER_CEILING = 67;
  // Synthetic fingerprint for an absent (Optional-hole) binding.
  const ABSENT_FP = 0;

  // ---- template skeleton (dry-rs#149) --------------------------------
  // Render the concrete TemplateNode tree as readable indented structure.
  // `Fixed` nodes show their label (+ leaf_lexeme when a fixed leaf);
  // `Hole(index)` nodes render a numbered marker (□1, □2, …). Holes carry a
  // `data-hole` attribute so the d-slider can toggle their visibility.
  // EVERYTHING is built with createElement + textContent (no markup sink).
  function skeletonNode(node, holes, depth) {
    const pad = "  ".repeat(depth);
    if (!node || typeof node !== "object") return h("div", null, pad + "?");
    if (node.node === "hole") {
      const idx = node.index ?? 0;
      const hole = holes[idx];
      const hot = hole && isHotspot(hole) ? " hotspot" : "";
      const marker = h(
        "span",
        { class: "hole" + hot, "data-hole": String(idx), title: holeTitle(hole, idx) },
        "□" + (idx + 1), // □N (1-based for humans)
      );
      return h("div", null, pad, marker);
    }
    // Fixed node.
    const label = node.label ?? "node";
    const kids = node.children || [];
    if (node.leaf_lexeme != null && kids.length === 0) {
      // A fixed leaf: show label + its shared lexeme.
      return h(
        "div",
        null,
        pad,
        h("span", { class: "node" }, label + " "),
        h("span", { class: "lex" }, node.leaf_lexeme),
      );
    }
    const head = h("div", null, pad, h("span", { class: "node" }, label));
    if (!kids.length) return head;
    return h("div", null, head, ...kids.map((c) => skeletonNode(c, holes, depth + 1)));
  }

  function holeTitle(hole, idx) {
    if (!hole) return "hole " + (idx + 1);
    const d = hole.divergence || {};
    return (
      "hole " + (idx + 1) + " · " + (hole.kind || "?") +
      " · " + (d.differing ?? 0) + "/" + (d.members ?? 0) + " differ"
    );
  }

  // A hole is a hotspot when most members diverge from the modal baseline.
  function isHotspot(hole) {
    const d = (hole && hole.divergence) || {};
    const members = d.members ?? 0;
    if (members < 2) return false;
    return (d.differing ?? 0) * 2 >= members; // >= half the members differ
  }

  function templateSkeleton(template) {
    const holes = template.holes || [];
    const pre = h("div", { class: "skeleton", "data-skeleton": "1" });
    appendKids(pre, skeletonNode(template.root, holes, 0));
    return pre;
  }

  // ---- substitution grid (dry-rs#149) --------------------------------
  // One row per member, one column per hole. A cell shows that member's
  // bound lexeme(s) for the hole — a variadic cell stacks multiple
  // elements. Columns whose hole is a hotspot get a highlight. Each column
  // carries `data-hole` so the d-slider can hide it.
  function gridCell(sub, hole) {
    const els = (sub && sub.elements) || [];
    if (!els.length) return h("td", null, h("span", { class: "absent" }, "<absent>"));
    // Mark a cell divergent when its (single) element fp is not the modal.
    // Guard on a KNOWN modal: when `distinct_values` is empty modalFp is
    // null, and `e.fp !== null` would falsely mark every scalar cell
    // divergent — so only apply divergent styling when a modal exists.
    const modal = modalFp(hole);
    const hasModal = modal !== null && modal !== undefined;
    const td = h("td", null);
    for (const e of els) {
      const cls =
        hasModal && els.length === 1 && e.fp !== modal
          ? "variadic-elem divergent"
          : "variadic-elem";
      appendKids(td, h("span", { class: cls }, e.lexeme ?? ""));
    }
    return td;
  }

  function modalFp(hole) {
    const dv = (hole && hole.divergence && hole.divergence.distinct_values) || [];
    // distinct_values is ordered by descending count, so the first is modal.
    return dv.length ? dv[0].fp : null;
  }

  function substitutionGrid(m) {
    const template = m.template;
    const holes = template.holes || [];
    const forms = m.forms || [];
    if (!holes.length) return null; // exact-dup / 0-hole: no grid.

    const headCells = [h("th", null, "member")];
    for (let hi = 0; hi < holes.length; hi++) {
      const hole = holes[hi];
      const hot = isHotspot(hole) ? " hotspot" : "";
      headCells.push(
        h(
          "th",
          { class: "hole-col" + hot, "data-hole": String(hi) },
          "□" + (hi + 1),
        ),
      );
    }
    const thead = h("thead", null, h("tr", null, ...headCells));

    const memberCount = forms.length;
    const rows = [];
    for (let k = 0; k < memberCount; k++) {
      const cells = [h("td", null, formLabel(forms[k] || {}))];
      for (let hi = 0; hi < holes.length; hi++) {
        const hole = holes[hi];
        const sub = (hole.substitutions || [])[k];
        const cell = gridCell(sub, hole);
        cell.setAttribute("data-hole", String(hi));
        cells.push(cell);
      }
      rows.push(h("tr", null, ...cells));
    }
    const table = h("table", { class: "subgrid" }, thead, h("tbody", null, rows));
    return h("div", { class: "grid-wrap" }, table);
  }

  // ---- d-slider (dry-rs#149) -----------------------------------------
  // A per-cluster range [0 .. members]. As d rises, holes whose
  // `divergence.differing < d` are hidden (skeleton marker + grid column).
  // The visible set is monotone non-increasing in d (property P4d).
  function applyDFilter(card, holes, d) {
    for (let hi = 0; hi < holes.length; hi++) {
      const differing = (holes[hi].divergence && holes[hi].divergence.differing) ?? 0;
      const hidden = differing < d;
      // Skeleton marker.
      const marker = card.querySelector('.skeleton .hole[data-hole="' + hi + '"]');
      if (marker) marker.classList.toggle("hidden-by-d", hidden);
      // Grid column (header + cells).
      const cols = card.querySelectorAll('.subgrid [data-hole="' + hi + '"]');
      cols.forEach((c) => c.classList.toggle("col-hidden", hidden));
    }
  }

  function dSlider(card, m) {
    const holes = m.template.holes || [];
    if (!holes.length) return null;
    const members = (m.forms || []).length;
    const max = Math.max(1, members);
    const input = h("input", {
      type: "range",
      min: "0",
      max: String(max),
      step: "1",
      value: "0",
    });
    const readout = h("span", { class: "d-readout" }, "d = 0 · " + holes.length + " holes shown");
    input.addEventListener("input", () => {
      const d = parseInt(input.value, 10) || 0;
      applyDFilter(card, holes, d);
      let shown = 0;
      for (const hole of holes) if (((hole.divergence && hole.divergence.differing) ?? 0) >= d) shown++;
      readout.textContent = "d = " + d + " · " + shown + " of " + holes.length + " holes shown";
    });
    return h(
      "div",
      { class: "d-slider", "data-dslider": "1" },
      h("label", null, "d-slider"),
      input,
      readout,
    );
  }

  // ---- cluster card --------------------------------------------------
  function clusterCard(m, i) {
    const forms = m.forms || [];
    const kind = (forms[0] && forms[0].kind) || "unknown";
    const card = h(
      "div",
      { class: "card", id: "match-" + i },
      h(
        "div",
        null,
        tierBadge(m.tier),
        " ",
        h("b", null, (m.score ?? 0).toFixed(2)),
        " ",
        h("span", { class: "meta" }, "· " + kind + " · " + forms.length + " forms"),
      ),
    );

    const template = m.template;
    if (template) {
      const holeCount = (template.holes || []).length;
      if (holeCount === 0) {
        // Exact-dup cluster: a concrete shared form, NO empty grid.
        appendKids(
          card,
          h("div", { class: "meta" }, "exact structural match · no holes"),
          templateSkeleton(template),
        );
      } else {
        appendKids(
          card,
          h("div", { class: "meta" }, "template · " + holeCount + " holes"),
          templateSkeleton(template),
        );
        const slider = dSlider(card, m);
        if (slider) appendKids(card, slider);
        // Large-cluster handling: collapse the grid by default beyond the
        // member ceiling; render lazily when revealed.
        if (forms.length > MEMBER_CEILING) {
          const note = h(
            "div",
            { class: "grid-collapsed-note" },
            forms.length + " members — substitution grid collapsed.",
          );
          const btn = h("button", { class: "reveal-btn", type: "button" }, "Show grid");
          let revealed = false;
          btn.addEventListener("click", () => {
            if (revealed) return;
            revealed = true;
            const grid = substitutionGrid(m);
            if (grid) {
              note.parentNode.insertBefore(grid, note.nextSibling);
              // Re-apply the active d-threshold so a lazily-revealed grid
              // honors a d the user already moved before clicking reveal
              // (otherwise it shows all columns until the next slider input).
              const range = card.querySelector('.d-slider input[type="range"]');
              const d = range ? parseInt(range.value, 10) || 0 : 0;
              applyDFilter(card, template.holes || [], d);
            }
            btn.disabled = true;
            btn.textContent = "Grid shown";
          });
          appendKids(card, note, btn);
        } else {
          const grid = substitutionGrid(m);
          if (grid) appendKids(card, grid);
        }
      }
    }

    appendKids(card, h("ul", null, forms.map((f) => h("li", null, formLabel(f)))));
    return card;
  }

  function renderClusters(env) {
    const matches = (env.result && env.result.matches) || [];
    const tierFilter = el("filter-tier").value;
    const minScore = parseFloat(el("filter-score").value) || 0;

    const visible = matches
      .map((m, i) => ({ m, i }))
      .filter(({ m }) => (!tierFilter || m.tier === tierFilter) && (m.score ?? 0) >= minScore)
      .sort((a, b) =>
        tierRank(a.m.tier) - tierRank(b.m.tier) || (b.m.score ?? 0) - (a.m.score ?? 0));

    el("cluster-count").textContent = visible.length + " of " + matches.length + " clusters";

    const list = el("cluster-list");
    clear(list);
    if (!visible.length) {
      appendKids(list, h("p", { class: "empty" }, "No clusters match the filters."));
      return;
    }
    appendKids(list, ...visible.map(({ m, i }) => clusterCard(m, i)));
  }

  // ---- scope banner (dry-rs#149) -------------------------------------
  // Read-only axes from Envelope.scope. When `crate_aware` is false, the two
  // crate axes are grayed (no crate-id was derivable, so the engine treated
  // them as no-ops). Degrades silently when scope is absent.
  function renderScopeBanner(env) {
    const section = el("scope-banner-section");
    if (!section) return;
    const scope = env.scope;
    if (!scope) {
      section.hidden = true;
      return;
    }
    const crateAware = scope.crate_aware !== false;
    const axes = [
      { key: "within_crate", label: "within-crate", crate: true },
      { key: "across_crate", label: "across-crate", crate: true },
      { key: "within_module", label: "within-module", crate: false },
      { key: "across_module", label: "across-module", crate: false },
    ];
    const chips = axes.map((a) => {
      const on = scope[a.key] !== false;
      let cls = "axis " + (on ? "on" : "off");
      let title = a.label + (on ? " allowed" : " excluded");
      // crate_aware == false grays the crate axes (no crate-id derivable).
      if (a.crate && !crateAware) {
        cls = "axis disabled";
        title = a.label + " — no crate-id derivable this run (axis no-op)";
      }
      return h("span", { class: cls, title }, a.label);
    });
    clear(section);
    section.hidden = false;
    appendKids(
      section,
      h("h2", null, "Scope"),
      h(
        "div",
        { class: "panel" },
        h(
          "div",
          { class: "scope-banner" },
          h("span", { class: "meta" }, "axes:"),
          ...chips,
          crateAware ? null : h("span", { class: "meta" }, "(crate axes inactive)"),
        ),
      ),
    );
  }

  // ---- hottest-cluster focus (explore mode, dry-rs#151) --------------
  // EXPLORE mode opens on the hottest cluster: rank = cardinality × score
  // × span-lines (the build-plan heuristic). Computed entirely client-side
  // — the binary re-run model (dry-rs#114) means scope changes re-invoke
  // `explore`, so there is no precomputed ranking on the wire. Pure DOM
  // ops: find the rendered card by its `match-<i>` id, scroll it into view,
  // and add a highlight class via classList — NO raw-markup sink.

  // Total source lines spanned by a match's member forms (end.line -
  // start.line + 1, summed across members). Spans are end-inclusive
  // (dry-rs span semantics), so a single-line form contributes 1.
  function matchSpanLines(m) {
    const forms = m.forms || [];
    let total = 0;
    for (const f of forms) {
      const s = f.span;
      if (!s || !s.start || !s.end) continue;
      const lines = (s.end.line - s.start.line) + 1;
      total += lines > 0 ? lines : 1;
    }
    return total;
  }

  // Hotness rank: cardinality × score × span-lines. A larger cluster of a
  // higher-scoring, larger-bodied duplication ranks hottest.
  function clusterHotness(m) {
    const cardinality = (m.forms || []).length;
    const score = m.score ?? 0;
    return cardinality * score * matchSpanLines(m);
  }

  // Pick the index (into result.matches) of the hottest cluster, or -1 when
  // there are none. Deterministic: ties keep the earlier index (stable).
  function hottestClusterIndex(matches) {
    let bestIdx = -1;
    let bestRank = -Infinity;
    matches.forEach((m, i) => {
      const rank = clusterHotness(m);
      if (rank > bestRank) {
        bestRank = rank;
        bestIdx = i;
      }
    });
    return bestIdx;
  }

  function focusHottestCluster(env) {
    if (!env.mode || env.mode !== "explore") return;
    const matches = (env.result && env.result.matches) || [];
    const idx = hottestClusterIndex(matches);
    if (idx < 0) return;
    const card = el("match-" + idx);
    if (!card) return; // filtered out of the current view — degrade silently.
    card.classList.add("hottest");
    // `scrollIntoView` is a DOM method, not a markup sink — safe.
    if (typeof card.scrollIntoView === "function") {
      card.scrollIntoView({ block: "start" });
    }
  }

  function main() {
    const env = loadData();
    if (!env) {
      const ov = el("overview");
      clear(ov);
      appendKids(
        ov,
        h("h2", null, "Overview"),
        h("div", { class: "panel empty" }, "Could not load report data."),
      );
      return;
    }
    renderScopeBanner(env);
    renderOverview(env);
    renderClusters(env);
    // EXPLORE mode auto-focuses the hottest cluster (dry-rs#151). Runs
    // AFTER renderClusters so the card DOM exists; no-op in REPORT mode.
    focusHottestCluster(env);
    el("filter-tier").addEventListener("change", () => renderClusters(env));
    el("filter-score").addEventListener("input", () => renderClusters(env));
  }

  main();
</script>
</body>
</html>
